name: Deploy to HF Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: arwei944/zenith-nav
        run: |
          pip install huggingface_hub

          echo "=== Deploying to HuggingFace Space ==="
          
          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = os.environ["HF_REPO"]
          
          # Files to keep (only these will exist on HF Space)
          keep_files = {"preview.html", "README.md", ".gitattributes"}
          
          # Delete all unwanted files from HF Space
          try:
              from huggingface_hub import HfFileSystem
              fs = HfFileSystem()
              existing = set(fs.ls(repo_id, detail=False))
              for f in existing:
                  fname = f.split("/")[-1] if "/" not in f else f
                  # Delete top-level files not in keep list, and all _next/ dirs
                  if fname not in keep_files or f.startswith("_next") or f.startswith("_not-found") or f == "404.html":
                      try:
                          api.delete_file(path_in_repo=f, repo_id=repo_id, repo_type="space", commit_message=f"Remove {f}")
                          print(f"Deleted {f}")
                      except:
                          pass
          except Exception as e:
              print(f"Cleanup error: {e}")
          
          # Upload all files from repo
          uploaded = 0
          for root, dirs, files in os.walk("."):
              if ".git" in root or ".github" in root:
                  continue
              for fname in files:
                  if fname.endswith(".txt"):
                      continue
                  fpath = os.path.join(root, fname)
                  repo_path = fpath.lstrip("./")
                  with open(fpath, "rb") as fobj:
                      api.upload_file(
                          path_or_fileobj=fobj,
                          path_in_repo=repo_path,
                          repo_id=repo_id,
                          repo_type="space",
                          commit_message=f"Upload {repo_path}"
                      )
                  print(f"Uploaded {repo_path} ({os.path.getsize(fpath)} bytes)")
                  uploaded += 1
          
          print(f"\n=== Done! {uploaded} files uploaded ===")
          PYEOF
