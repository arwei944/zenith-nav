name: Deploy to HF Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: arwei944/zenith-nav
        run: |
          pip install huggingface_hub

          # Upload each file individually using curl
          echo "=== Deploying to HuggingFace Space ==="
          
          for file in $(find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -name '*.txt' \
            | sort); do
            
            repo_path="${file#./}"
            echo "Uploading: $repo_path ($(wc -c < "$file") bytes)"
            
            curl -s -X PUT \
              "https://huggingface.co/api/spaces/$HF_REPO/upload/$repo_path" \
              -H "Authorization: Bearer $HF_TOKEN" \
              --data-binary "@$file" \
              -o /dev/null -w "HTTP %{http_code}\n"
          done
          
          echo "=== Deploy complete ==="
