name: Deploy to HF Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import HfApi
          import os, glob

          api = HfApi()
          api.create_repo(repo_id='arwei944/zenith-nav', repo_type='space', space_sdk='static', private=False, exist_ok=True)

          # Delete old files that no longer exist
          for old_file in ['style.css', 'README.md']:
              try:
                  api.delete_file(path_in_repo=old_file, repo_id='arwei944/zenith-nav', repo_type='space')
                  print(f'Deleted {old_file}')
              except:
                  pass

          # Upload all files
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '.github' in root:
                  continue
              # Skip Next.js meta files
              files = [f for f in files if not f.endswith('.txt')]
              for file in files:
                  file_path = os.path.join(root, file)
                  repo_path = file_path.lstrip('./')
                  print(f'Uploading {file_path} -> {repo_path}')
                  api.upload_file(path_or_fileobj=file_path, path_in_repo=repo_path, repo_id='arwei944/zenith-nav', repo_type='space')
          print('Done!')
          "
