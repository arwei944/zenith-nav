<title>Zenith Nav</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ios-wallpaper:linear-gradient(145deg,#1a1a2e 0%,#16213e 30%,#0f3460 60%,#533483 100%);
  --ios-label-shadow:0 0.5px 2px rgba(0,0,0,0.6);
  --ios-icon-size:60px;
  --ios-icon-radius:13.5px;
  --ios-cols:4;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  background:var(--ios-wallpaper);
  color:#fff;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  user-select:none;
}

.status-bar{
  flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 24px 8px;
  font-size:14px;font-weight:600;
  text-shadow:var(--ios-label-shadow);
}
.status-bar-time{font-variant-numeric:tabular-nums}
.status-bar-icons{display:flex;gap:6px;align-items:center;font-size:12px}

.desktop{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:20px 24px 10px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.desktop::-webkit-scrollbar{display:none}

.icon-grid{
  display:grid;
  grid-template-columns:repeat(var(--ios-cols),1fr);
  gap:24px 0;
  justify-items:center;
  padding-bottom:16px;
}

.app-icon{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  width:75px;
  text-decoration:none;color:#fff;
  cursor:pointer;
  transition:transform 0.1s;
}
.app-icon:active{transform:scale(0.88)}

.app-icon-img{
  width:var(--ios-icon-size);height:var(--ios-icon-size);
  border-radius:var(--ios-icon-radius);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25),inset 0 0.5px 0 rgba(255,255,255,0.15);
  overflow:hidden;
}
.app-icon-img img{width:100%;height:100%;object-fit:cover;border-radius:var(--ios-icon-radius)}

.app-icon-label{
  font-size:11px;font-weight:400;
  text-align:center;
  text-shadow:var(--ios-label-shadow);
  max-width:75px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.2;
}

.folder{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  width:75px;cursor:pointer;
  transition:transform 0.1s;
}
.folder:active{transform:scale(0.88)}

.folder-icon{
  width:var(--ios-icon-size);height:var(--ios-icon-size);
  border-radius:var(--ios-icon-radius);
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:0.5px solid rgba(255,255,255,0.06);
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:2px;padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  position:relative;overflow:hidden;
}
.folder-icon::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,0.06);
  border-radius:var(--ios-icon-radius) var(--ios-icon-radius) 0 0;
}

.folder-mini-icon{
  width:100%;height:100%;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}

.folder-label{
  font-size:11px;font-weight:400;
  text-align:center;
  text-shadow:var(--ios-label-shadow);
  max-width:75px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.folder-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  animation:folderIn 0.25s ease;
}
.folder-overlay.open{display:flex}
@keyframes folderIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

.folder-panel{
  width:100%;max-width:360px;
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);
  border-radius:20px;
  border:0.5px solid rgba(255,255,255,0.1);
  padding:20px 16px 16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.folder-panel-title{text-align:center;font-size:20px;font-weight:500;margin-bottom:16px;text-shadow:var(--ios-label-shadow)}
.folder-panel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 0;justify-items:center}
.folder-close{text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer}

.search-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  display:none;flex-direction:column;
  padding:60px 20px 20px;
  animation:fadeIn 0.2s ease;
}
.search-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.search-box{width:100%;max-width:500px;margin:0 auto 24px;position:relative}
.search-box input{
  width:100%;padding:12px 16px 12px 42px;
  border:none;border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:#fff;font-size:16px;font-family:inherit;outline:none;
}
.search-box input::placeholder{color:rgba(255,255,255,0.35)}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,0.4)}
.search-cancel{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.15);border:none;color:rgba(255,255,255,0.6);
  font-size:13px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;display:none;
}
.search-cancel.show{display:block}

.search-results{flex:1;overflow-y:auto;max-width:500px;margin:0 auto;width:100%;scrollbar-width:none}
.search-results::-webkit-scrollbar{display:none}

.search-result-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background 0.15s;
  text-decoration:none;color:#fff;
}
.search-result-item:hover{background:rgba(255,255,255,0.06)}
.search-result-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
}
.search-result-icon img{width:100%;height:100%;border-radius:8px;object-fit:cover}
.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:15px;font-weight:400}
.search-result-url{font-size:12px;color:rgba(255,255,255,0.4);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-empty{text-align:center;padding:40px 0;color:rgba(255,255,255,0.3);font-size:15px}

.dock{flex-shrink:0;padding:8px 20px 28px;display:flex;justify-content:center}
.dock-inner{
  display:flex;gap:18px;padding:10px 16px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-radius:24px;
  border:0.5px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(0,0,0,0.3);
}
.dock .app-icon{width:60px}
.dock .app-icon-img{width:52px;height:52px;font-size:24px;border-radius:12px}
.dock .app-icon-label{font-size:10px}

@media(min-width:500px){:root{--ios-cols:5;--ios-icon-size:64px}}
@media(min-width:768px){:root{--ios-cols:6;--ios-icon-size:68px}.app-icon{width:85px}.folder{width:85px}.app-icon-label,.folder-label{max-width:85px}}
@media(min-width:1024px){:root{--ios-cols:7;--ios-icon-size:72px}.app-icon{width:90px}.folder{width:90px}.app-icon-label,.folder-label{max-width:90px}}
</style>

function renderDesktop(){
  const d=document.getElementById('desktop');
  let h='<div class="icon-grid">';
  h+=`<div class="app-icon" onclick="openSearch()">
    <div class="app-icon-img" style="background:linear-gradient(145deg,#636366,#48484A)">
      <svg width="28" height="28" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2"><circle cx="8.5" cy="8.5" r="6"/><path d="m14 14 4 4"/></svg>
    </div>
    <div class="app-icon-label">搜索</div>
  </div>`;
  DATA.folders.forEach((f,i)=>{
    const p=f.links.slice(0,4).map(l=>`<div class="folder-mini-icon" style="background:${getColor(l.title)}">${l.title.charAt(0)}</div>`).join('');
    h+=`<div class="folder" onclick="openFolder(${i})">
      <div class="folder-icon">${p}</div>
      <div class="folder-label">${f.name}</div>
    </div>`;
  });
  h+='</div>';
  d.innerHTML=h;
}

function renderDock(){
  document.getElementById('dock').innerHTML=DATA.dock.map(i=>`
    <a class="app-icon" href="${i.url}" target="_blank" rel="noopener">
      <div class="app-icon-img" style="background:${i.color}">
        <img src="${getFavicon(i.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${i.emoji}'">
      </div>
      <div class="app-icon-label">${i.title}</div>
    </a>`).join('');
}

function openFolder(i){

        <img src="${getFavicon(l.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${l.title.charAt(0)}'">
      </div>
      <div class="app-icon-label" style="max-width:65px;font-size:10px">${l.title}</div>
    </a>`).join('');
  document.getElementById('folderOverlay').classList.add('open');
}

function closeFolder(e){if(e&&e.target!==document.getElementById('folderOverlay'))return;document.getElementById('folderOverlay').classList.remove('open')}

function openSearch(){document.getElementById('searchOverlay').classList.add('open');setTimeout(()=>document.getElementById('searchInput').focus(),100)}
function closeSearch(){document.getElementById('searchOverlay').classList.remove('open');document.getElementById('searchInput').value='';document.getElementById('searchResults').innerHTML='';document.getElementById('searchCancel').classList.remove('show')}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchCancel').classList.toggle('show',q.length>0);
  if(!q){document.getElementById('searchResults').innerHTML='';return}
  const all=[];
  DATA.folders.forEach(f=>f.links.forEach(l=>all.push({...l,folder:f.name})));
  DATA.dock.forEach(l=>all.push({...l,folder:'Dock'}));
  const r=all.filter(l=>l.title.toLowerCase().includes(q)||l.url.toLowerCase().includes(q)||l.folder.toLowerCase().includes(q));
  if(!r.length){document.getElementById('searchResults').innerHTML='<div class="search-empty">没有找到结果</div>';return}
  document.getElementById('searchResults').innerHTML=r.map(x=>`
    <a class="search-result-item" href="${x.url}" target="_blank" rel="noopener">
      <div class="search-result-icon" style="background:${getColor(x.title)}">
        <img src="${getFavicon(x.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${x.title.charAt(0)}'">
      </div>
      <div class="search-result-info">
        <div class="search-result-title">${x.title}</div>
        <div class="search-result-url">${getDomain(x.url)} · ${x.folder}</div>
      </div>
    </a>`).join('');
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

let tsy=0;
document.addEventListener('touchstart',e=>{tsy=e.touches[0].clientY});
document.addEventListener('touchend',e=>{if(tsy-e.changedTouches[0].clientY>80&&!document.querySelector('.folder-overlay.open')&&!document.querySelector('.search-overlay.open'))openSearch()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeFolder();closeSearch()}});

renderDesktop();renderDock();updateClock();setInterval(updateClock,10000);
</script>
</body>
</html>
