<!DOCTYPE html>
<html lang="zh-CN">

<style>
/* ========== Reset & Base ========== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC',sans-serif;
  background:#000;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  user-select:none;
  -webkit-user-select:none;
}

:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
a{color:inherit;text-decoration:none}
img{display:block}

/* ========== Wallpaper ========== */
.wallpaper{
  position:fixed;inset:0;z-index:0;
  background:
    linear-gradient(135deg,rgba(102,126,234,0.4) 0%,transparent 50%),
    linear-gradient(225deg,rgba(118,75,162,0.4) 0%,transparent 50%),
    linear-gradient(315deg,rgba(240,147,251,0.3) 0%,transparent 50%),
    linear-gradient(45deg,rgba(79,172,254,0.3) 0%,transparent 50%),
    linear-gradient(180deg,#1a1a2e 0%,#16213e 30%,#0f3460 60%,#533483 100%);
}

/* ========== macOS Layout ========== */
.macos-view{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:rgba(30,30,35,0.95);
  z-index:1;
}

/* Menu Bar */
.macos-menubar{
  height:28px;flex-shrink:0;
  display:flex;align-items:center;
  padding:0 16px;gap:16px;
  background:rgba(40,40,48,0.9);
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  font-size:13px;font-weight:500;
}
.macos-menubar-logo{font-size:15px}
.macos-menubar-app{color:rgba(255,255,255,0.85);font-weight:600}
.macos-menubar-item{color:rgba(255,255,255,0.6);cursor:pointer;transition:color 0.15s}
.macos-menubar-item:hover{color:#fff}
.macos-menubar-right{margin-left:auto;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.6);font-size:12px}

/* Body */
.macos-body{
  flex:1;display:flex;overflow:hidden;
}

/* Sidebar */
.macos-sidebar{
  width:200px;flex-shrink:0;
  background:rgba(35,35,42,0.95);
  border-right:0.5px solid rgba(255,255,255,0.06);
  overflow-y:auto;
  padding:8px 0;
  scrollbar-width:none;
}
.macos-sidebar::-webkit-scrollbar{display:none}
.macos-sidebar-section{
  padding:4px 12px 4px;
  font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);
  text-transform:uppercase;letter-spacing:0.5px;
  margin-top:8px;
}
.macos-sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;margin:1px 8px;
  border-radius:6px;
  font-size:13px;
  color:rgba(255,255,255,0.75);
  cursor:pointer;
  transition:all 0.15s;
}
.macos-sidebar-item:hover{background:rgba(255,255,255,0.06);color:#fff}
.macos-sidebar-item.active{background:rgba(59,130,246,0.2);color:#60a5fa}
.macos-sidebar-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.macos-sidebar-badge{
  margin-left:auto;font-size:11px;
  background:rgba(255,255,255,0.1);
  padding:1px 6px;border-radius:8px;
  color:rgba(255,255,255,0.5);
}

/* Main Content */
.macos-main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.macos-main-header{
  padding:16px 24px 12px;
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.macos-main-title{font-size:22px;font-weight:700;margin-bottom:10px}
.macos-search{
  position:relative;
}
.macos-search input{
  width:100%;max-width:400px;
  padding:8px 12px 8px 32px;
  border:0.5px solid rgba(255,255,255,0.1);
  border-radius:8px;
  background:rgba(255,255,255,0.06);
  color:#fff;font-size:13px;font-family:inherit;
  outline:none;transition:all 0.2s;
}
.macos-search input:focus{border-color:rgba(59,130,246,0.5);background:rgba(255,255,255,0.08)}
.macos-search input::placeholder{color:rgba(255,255,255,0.3)}
.macos-search svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:rgba(255,255,255,0.35);
}
.macos-content{
  flex:1;overflow-y:auto;padding:16px 24px;
  scrollbar-width:none;
}
.macos-content::-webkit-scrollbar{display:none}
.macos-cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}
.macos-card{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.06);
  cursor:pointer;
  transition:all 0.15s;
}
.macos-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1)}
.macos-card:active{transform:scale(0.98)}
.macos-card-favicon{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;overflow:hidden;
}
.macos-card-favicon img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.macos-card-info{flex:1;min-width:0}
.macos-card-title{font-size:13px;font-weight:500}
.macos-card-domain{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Dock */
.macos-dock{
  flex-shrink:0;
  padding:6px 16px calc(8px + var(--safe-bottom));
  display:flex;justify-content:center;
}
.macos-dock-inner{
  display:flex;gap:4px;
  padding:4px 8px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  border-radius:16px;
  border:0.5px solid rgba(255,255,255,0.08);
  overflow-x:auto;
  scrollbar-width:none;
}
.macos-dock-inner::-webkit-scrollbar{display:none}
.macos-dock-item{
  width:40px;height:40px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  cursor:pointer;transition:transform 0.12s;
  overflow:hidden;
}
.macos-dock-item:hover{transform:scale(1.15) translateY(-4px)}
.macos-dock-item:active{transform:scale(0.9)}
.macos-dock-item img{width:100%;height:100%;object-fit:cover}

/* Global Search Overlay */
.search-results-overlay{
  position:fixed;inset:0;z-index:8000;
  display:none;opacity:0;
  transition:opacity 0.2s;
}
.search-results-overlay.open{display:block;opacity:1}
.search-results-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.search-results-panel{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.95);
  width:min(480px,92vw);
  max-height:70vh;
  background:rgba(30,30,40,0.95);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:20px;
  border:0.5px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);
}
.search-results-overlay.open .search-results-panel{transform:translate(-50%,-50%) scale(1)}
.sr-header{
  padding:16px 16px 12px;
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;
}
.sr-header input{
  flex:1;padding:10px 14px 10px 36px;
  border:none;border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;font-size:15px;font-family:inherit;
  outline:none;
}
.sr-header input::placeholder{color:rgba(255,255,255,0.3)}
.sr-header-icon{
  position:absolute;left:28px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:rgba(255,255,255,0.35);
}
.sr-header-wrap{position:relative;flex:1}
.sr-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:none;color:rgba(255,255,255,0.7);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.15s;
}
.sr-close:hover{background:rgba(255,255,255,0.18)}
.sr-list{
  flex:1;overflow-y:auto;padding:8px;
  scrollbar-width:none;
}
.sr-list::-webkit-scrollbar{display:none}
.sr-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background 0.12s;
}
.sr-item:hover{background:rgba(255,255,255,0.06)}
.sr-item-favicon{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;overflow:hidden;
}
.sr-item-favicon img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sr-item-info{flex:1;min-width:0}
.sr-item-title{font-size:14px}
.sr-item-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:1px}
.sr-empty{text-align:center;padding:40px 0;color:rgba(255,255,255,0.3);font-size:14px}

/* Responsive */
@media(max-width:700px){
  .macos-sidebar{width:56px;padding:8px 0}
  .macos-sidebar-section{display:none}
  .macos-sidebar-item{padding:8px;margin:2px 6px;justify-content:center}
  .macos-sidebar-item span,.macos-sidebar-badge{display:none}
  .macos-sidebar-icon{width:auto;font-size:18px}
  .macos-cards{grid-template-columns:1fr}
}

<script>
// ========== Data ==========
const COLORS=['#FF3B30','#FF9500','#FFCC00','#34C759','#00C7BE','#30B0C7','#007AFF','#5856D6','#AF52DE','#FF2D55','#A2845E','#64D2FF','#FF6482','#5AC8FA','#FFD60A','#32D74B','#BF5AF2'];
function getColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function getDomain(u){try{return new URL(u).hostname.replace('www.','')}catch{return u}}

// ========== Multi-source Favicon ==========
// 策略：优先使用 favicon.im（最可靠），直接获取作为备选
// 
// 为什么不用直接获取优先？
// 1. 跨域问题：直接获取 /favicon.ico 会被 CORS 拦截
// 2. 路径不确定：有些网站 favicon 在 /images/favicon.ico 或其他路径
// 3. 第三方服务已经处理了这些问题
//
// 回退链：
// ① favicon.im (256px, Cloudflare, ~95%成功率)
// ② Google S2 (128px, 稳定, ~99%累计成功率)  
// ③ DuckDuckGo (备选, ~99.5%累计成功率)
// ④ 首字母 fallback (100%可用)

const FAVICON_SOURCES={
  // 主源：favicon.im - 256px高清，Cloudflare CDN
  primary:(d)=>'https://favicon.im/'+d+'?larger=true',
  // 备选1：Google S2 - 128px，老牌稳定
  backup1:(d)=>'https://www.google.com/s2/favicons?domain='+d+'&sz=128',
  // 备选2：DuckDuckGo
  backup2:(d)=>'https://icons.duckduckgo.com/ip3/'+d+'.ico',
};

// 全局存储每个URL的图标源列表
const FAVICON_CACHE=new Map();

function getFaviconUrl(url){
  try{
    const d=new URL(url).hostname;
    return FAVICON_SOURCES.primary(d);
  }catch{return''}
}

function faviconImg(url, fallback){
  try{
    const d=new URL(url).hostname;
    const sources=[
      FAVICON_SOURCES.primary(d),
      FAVICON_SOURCES.backup1(d),
      FAVICON_SOURCES.backup2(d)
    ];
    const id='fi_'+Math.random().toString(36).slice(2,9);
    FAVICON_CACHE.set(id, {sources, fallback, idx:0});
    return '<img id="'+id+'" src="'+sources[0]+'" alt="" onerror="faviconTryNext(this)">';
  }catch{
    return '<span>'+fallback+'</span>';
  }
}

function faviconTryNext(img){
  const cache=FAVICON_CACHE.get(img.id);
  if(!cache)return;
  cache.idx++;
  if(cache.idx<cache.sources.length){
    img.src=cache.sources[cache.idx];
  }else{
    img.outerHTML='<span>'+cache.fallback+'</span>';
    FAVICON_CACHE.delete(img.id);
  }
}

// ========== Helpers ==========
function getAllLinks(){
  const all=[];
  DATA.folders.forEach(f=>f.links.forEach(l=>all.push({...l,folder:f.name,folderIcon:f.icon})));
  DATA.dock.forEach(l=>all.push({...l,folder:'Dock',folderIcon:'🚀'}));
  return all;
}
function searchLinks(q){
  if(!q)return null;
  q=q.toLowerCase();
  return getAllLinks().filter(l=>l.title.toLowerCase().includes(q)||getDomain(l.url).toLowerCase().includes(q)||l.folder.toLowerCase().includes(q));
}

// ========== macOS Sidebar & Content ==========
let macCurrentCat=-1;

function renderMac(){
  const sidebar=document.getElementById('macSidebar');
  let h='<div class="macos-sidebar-section">分类</div>';
  h+='<div class="macos-sidebar-item'+(macCurrentCat===-1?' active':'')+'" onclick="macSelect(-1)"><span class="macos-sidebar-icon">📋</span><span>全部</span></div>';
  DATA.folders.forEach((f,i)=>{
    h+='<div class="macos-sidebar-item'+(macCurrentCat===i?' active':'')+'" onclick="macSelect('+i+')"><span class="macos-sidebar-icon">'+f.icon+'</span><span>'+f.name+'</span><span class="macos-sidebar-badge">'+f.links.length+'</span></div>';
  });
  sidebar.innerHTML=h;

  // Dock
  document.getElementById('macDock').innerHTML=DATA.dock.map(d=>
    '<a class="macos-dock-item" href="'+d.url+'" target="_blank" rel="noopener" title="'+d.title+'" style="background:'+d.color+'">'+faviconImg(d.url,d.emoji)+'</a>'
  ).join('');

  renderMacCards();
}

function macSelect(i){
  macCurrentCat=i;
  renderMac();
}

function renderMacCards(filter){
  const title=document.getElementById('macTitle');
  const cards=document.getElementById('macCards');
  let links=[];
  if(macCurrentCat===-1){
    title.textContent='全部';
    DATA.folders.forEach(f=>f.links.forEach(l=>links.push({...l,folder:f.name})));
  }else{
    const f=DATA.folders[macCurrentCat];
    title.textContent=f.icon+' '+f.name;
    links=f.links.map(l=>({...l,folder:f.name}));
  }
  if(filter){
    const q=filter.toLowerCase();
    links=links.filter(l=>l.title.toLowerCase().includes(q)||getDomain(l.url).toLowerCase().includes(q));
  }
  if(!links.length){
    cards.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.3)">没有找到结果</div>';
    return;
  }
  cards.innerHTML=links.map(l=>
    '<a class="macos-card" href="'+l.url+'" target="_blank" rel="noopener">'+
    '<div class="macos-card-favicon" style="background:'+getColor(l.title)+'">'+faviconImg(l.url,l.title.charAt(0))+'</div>'+
    '<div class="macos-card-info"><div class="macos-card-title">'+l.title+'</div><div class="macos-card-domain">'+getDomain(l.url)+(l.folder?' · '+l.folder:'')+'</div></div></a>'
  ).join('');
}

let macSearchTimer=null;
function macSearch(q){
  clearTimeout(macSearchTimer);
  macSearchTimer=setTimeout(()=>renderMacCards(q),200);
}

// ========== Global Search ==========
function openGlobalSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('globalSearchInput').focus(),100);
}
function closeGlobalSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('globalSearchInput').value='';
  document.getElementById('globalSearchResults').innerHTML='';
}
let gsTimer=null;
function globalSearch(q){
  clearTimeout(gsTimer);
  gsTimer=setTimeout(()=>{
    const results=searchLinks(q);
    const el=document.getElementById('globalSearchResults');
    if(!q.trim()||!results||!results.length){
      el.innerHTML=q.trim()?'<div class="sr-empty">没有找到结果</div>':'';
      return;
    }
    el.innerHTML=results.map(r=>
      '<a class="sr-item" href="'+r.url+'" target="_blank" rel="noopener">'+
      '<div class="sr-item-favicon" style="background:'+getColor(r.title)+'">'+faviconImg(r.url,r.title.charAt(0))+'</div>'+
      '<div class="sr-item-info"><div class="sr-item-title">'+r.title+'</div><div class="sr-item-sub">'+getDomain(r.url)+' · '+r.folder+'</div></div></a>'
    ).join('');
  },150);
}

// ========== Clock ==========
function updateClock(){
  const n=new Date();
  const t=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const el=document.getElementById('macClock');
  if(el)el.textContent=t;
}

// ========== Keyboard ==========
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeGlobalSearch();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    openGlobalSearch();
  }
});

// ========== Init ==========
renderMac();
updateClock();
setInterval(updateClock,10000);
</script>
