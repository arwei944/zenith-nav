<!DOCTYPE html>

<style>
/* ========== CSS Reset & Base ========== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  background:#000;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  user-select:none;
  -webkit-user-select:none;
}

/* ========== iOS Design Tokens ========== */
:root{
  /* iOS Standard Grid */
  --ios-icon-size:60px;
  --ios-icon-radius:14px; /* Squircle approx */
  --ios-cols:4;
  --ios-rows:6;
  --icon-gap-x:22px;
  --icon-gap-y:26px;
  --page-margin:23px;
  
  /* Status Bar */
  --status-bar-height:44px;
  
  /* Label */
  --label-font-size:11px;
  --label-line-height:13px;
  --label-margin-top:5px;
  
  /* Dock */
  --dock-height:84px;
  --dock-padding:12px;
  --dock-icon-size:52px;
}

/* ========== Wallpaper Layer ========== */
.wallpaper{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    linear-gradient(135deg, rgba(102,126,234,0.4) 0%, transparent 50%),
    linear-gradient(225deg, rgba(118,75,162,0.4) 0%, transparent 50%),
    linear-gradient(315deg, rgba(240,147,251,0.3) 0%, transparent 50%),
    linear-gradient(45deg, rgba(79,172,254,0.3) 0%, transparent 50%),
    linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
  background-size:cover;
}

/* ========== Status Bar ========== */
.status-bar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--status-bar-height);
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:12px 24px 0;
  font-size:15px;
  font-weight:600;
  letter-spacing:-0.3px;
}
.status-bar-time{
  font-variant-numeric:tabular-nums;
  min-width:40px;
}
.status-bar-icons{
  display:flex;
  align-items:center;
  gap:5px;
}
.status-icon{
  width:18px;
  height:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ========== Desktop Container ========== */
.desktop-container{
  position:fixed;
  top:var(--status-bar-height);
  left:0;
  right:0;
  bottom:var(--dock-height);
  z-index:10;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:8px var(--page-margin) 20px;
}
.desktop-container::-webkit-scrollbar{display:none}

/* ========== Icon Grid ========== */
.icon-grid{
  display:grid;
  grid-template-columns:repeat(var(--ios-cols),1fr);
  gap:var(--icon-gap-y) var(--icon-gap-x);
  justify-items:center;
  padding-top:4px;
}

/* ========== Squircle Shape ========== */
.squircle{
  border-radius:var(--ios-icon-radius);
  position:relative;
  overflow:hidden;
}
.squircle::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.2);
  pointer-events:none;
  z-index:1;
}

/* ========== App Icon ========== */
.app-icon{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:76px;
  cursor:pointer;
  transition:transform 0.1s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
}
.app-icon:active{transform:scale(0.87)}

.app-icon-img{
  width:var(--ios-icon-size);
  height:var(--ios-icon-size);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,rgba(255,255,255,0) 50%),var(--icon-bg,#636366);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.25),
    0 0 0 0.5px rgba(0,0,0,0.1),
    inset 0 0.5px 0 rgba(255,255,255,0.25);
}
.app-icon-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.app-icon-label{
  margin-top:var(--label-margin-top);
  font-size:var(--label-font-size);
  line-height:var(--label-line-height);
  font-weight:400;
  text-align:center;
  color:rgba(255,255,255,0.95);
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
  max-width:76px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  letter-spacing:-0.1px;
}

/* ========== Folder ========== */
.folder{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:76px;
  cursor:pointer;
  transition:transform 0.1s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
}
.folder:active{transform:scale(0.87)}

.folder-icon{
  width:var(--ios-icon-size);
  height:var(--ios-icon-size);
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(25px) saturate(180%);
  -webkit-backdrop-filter:blur(25px) saturate(180%);
  border:0.5px solid rgba(255,255,255,0.12);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.2),
    inset 0 0.5px 0 rgba(255,255,255,0.15);
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px;
  padding:10px;
  position:relative;
}
.folder-icon::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 100%);
  border-radius:inherit;
  pointer-events:none;
}

.folder-mini-icon{
  width:100%;
  height:100%;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:600;
}

.folder-label{
  margin-top:var(--label-margin-top);
  font-size:var(--label-font-size);
  line-height:var(--label-line-height);
  font-weight:400;
  text-align:center;
  color:rgba(255,255,255,0.95);
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
  max-width:76px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* ========== Folder Overlay ========== */
.folder-overlay{
  position:fixed;
  inset:0;
  z-index:2000;
  display:none;
  opacity:0;
  transition:opacity 0.2s ease;
}
.folder-overlay.open{
  display:block;
  opacity:1;
}

.folder-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(20px) saturate(120%);
  -webkit-backdrop-filter:blur(20px) saturate(120%);
}

.folder-panel-wrapper{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:all 0.35s cubic-bezier(0.32,0.72,0,1);
  will-change:transform,opacity,width,height;
}

.folder-panel{
  background:rgba(255,255,255,0.16);
  backdrop-filter:blur(50px) saturate(200%);
  -webkit-backdrop-filter:blur(50px) saturate(200%);
  border-radius:24px;
  border:0.5px solid rgba(255,255,255,0.12);
  box-shadow:
    0 25px 80px rgba(0,0,0,0.4),
    inset 0 0.5px 0 rgba(255,255,255,0.1);
  padding:20px 16px 16px;
  width:100%;
}

.folder-panel-title{
  text-align:center;
  font-size:20px;
  font-weight:600;
  margin-bottom:16px;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  letter-spacing:-0.3px;
}

.folder-panel-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px 0;
  justify-items:center;
}

.folder-close-btn{
  margin-top:16px;
  padding:8px 24px;
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  font-size:15px;
  font-weight:500;
  color:rgba(255,255,255,0.9);
  cursor:pointer;
  transition:background 0.15s;
  border:0.5px solid rgba(255,255,255,0.1);
}
.folder-close-btn:hover{background:rgba(255,255,255,0.22)}
.folder-close-btn:active{background:rgba(255,255,255,0.1)}

/* ========== Search Overlay ========== */
.search-overlay{
  position:fixed;
  inset:0;
  z-index:3000;
  display:none;
  flex-direction:column;
  padding:60px 20px 20px;
  opacity:0;
  transition:opacity 0.2s ease;
}
.search-overlay.open{
  display:flex;
  opacity:1;
}

.search-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(30px) saturate(150%);
  -webkit-backdrop-filter:blur(30px) saturate(150%);
}

.search-box{
  position:relative;
  width:100%;
  max-width:500px;
  margin:0 auto 24px;
}
.search-box input{
  width:100%;
  padding:12px 44px 12px 42px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  font-size:17px;
  font-family:inherit;
  outline:none;
  transition:background 0.15s;
}
.search-box input:focus{background:rgba(255,255,255,0.18)}
.search-box input::placeholder{color:rgba(255,255,255,0.4)}
.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  color:rgba(255,255,255,0.5);
}
.search-cancel{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.15);
  border:none;
  color:rgba(255,255,255,0.8);
  font-size:14px;
  padding:5px 12px;
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;
  font-weight:500;
  opacity:0;
  transition:opacity 0.15s;
  pointer-events:none;
}
.search-cancel.show{
  opacity:1;
  pointer-events:auto;
}

.search-results{
  flex:1;
  overflow-y:auto;
  max-width:500px;
  margin:0 auto;
  width:100%;
  scrollbar-width:none;
}
.search-results::-webkit-scrollbar{display:none}

.search-result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:12px;
  cursor:pointer;
  transition:background 0.15s;
  text-decoration:none;
  color:#fff;
}
.search-result-item:hover{background:rgba(255,255,255,0.08)}
.search-result-item:active{background:rgba(255,255,255,0.12)}

.search-result-icon{
  width:36px;
  height:36px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:600;
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
}
.search-result-icon img{width:100%;height:100%;border-radius:9px;object-fit:cover}

.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:16px;font-weight:400;letter-spacing:-0.2px}
.search-result-url{font-size:13px;color:rgba(255,255,255,0.4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.search-empty{text-align:center;padding:60px 0;color:rgba(255,255,255,0.35);font-size:16px}

/* ========== Dock ========== */
.dock-container{
  position:fixed;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  padding:0 12px 28px;
}

.dock{
  display:flex;
  gap:14px;
  padding:11px 14px;
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(35px) saturate(200%);
  -webkit-backdrop-filter:blur(35px) saturate(200%);
  border-radius:28px;
  border:0.5px solid rgba(255,255,255,0.1);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.25),
    inset 0 0.5px 0 rgba(255,255,255,0.12);
}

.dock .app-icon{width:62px}
.dock .app-icon-img{
  width:var(--dock-icon-size);
  height:var(--dock-icon-size);
  font-size:24px;
  border-radius:12px;
}
.dock .app-icon-label{font-size:10px;margin-top:4px}

/* ========== Page Indicator ========== */
.page-indicator{
  position:fixed;
  bottom:calc(var(--dock-height) + 8px);
  left:50%;
  transform:translateX(-50%);
  z-index:50;
  display:flex;
  gap:6px;
}
.page-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.35);
  transition:background 0.2s;
}
.page-dot.active{background:rgba(255,255,255,0.9)}

/* ========== Responsive ========== */
@media(min-width:390px){
  :root{
    --ios-icon-size:64px;
    --icon-gap-x:24px;
    --dock-icon-size:54px;
  }
  .app-icon,.folder{width:80px}
  .dock .app-icon{width:64px}
}

@media(min-width:428px){
  :root{
    --page-margin:27px;
    --icon-gap-x:26px;
  }
}

@media(min-width:768px){
  :root{
    --ios-cols:6;
    --ios-icon-size:68px;
    --page-margin:40px;
  }
  .app-icon,.folder{width:84px}
}

@media(min-width:1024px){
  :root{
    --ios-cols:8;
    --ios-icon-size:72px;
  }
  .app-icon,.folder{width:88px}
}
</style>

// ========== Render Functions ==========
function renderDesktop(){
  const d=document.getElementById('desktop');
  let h='<div class="icon-grid">';
  
  // Search icon
  h+=`<div class="app-icon" onclick="openSearch()">
    <div class="app-icon-img squircle" style="--icon-bg:linear-gradient(145deg,#636366,#48484A)">
      <svg width="26" height="26" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="6"/>
        <path d="m14 14 4 4"/>
      </svg>
    </div>
    <div class="app-icon-label">搜索</div>
  </div>`;
  
  // Folders
  DATA.folders.forEach((f,i)=>{
    const p=f.links.slice(0,4).map(l=>`<div class="folder-mini-icon squircle" style="background:${getColor(l.title)};font-size:12px;font-weight:600">${l.title.charAt(0)}</div>`).join('');
    h+=`<div class="folder" data-index="${i}" onclick="openFolder(${i},this)">
      <div class="folder-icon squircle">${p}</div>
      <div class="folder-label">${f.name}</div>
    </div>`;
  });
  
  h+='</div>';
  d.innerHTML=h;
}

function renderDock(){
  document.getElementById('dock').innerHTML=DATA.dock.map(i=>`
    <a class="app-icon" href="${i.url}" target="_blank" rel="noopener">
      <div class="app-icon-img squircle" style="--icon-bg:${i.color}">
        <img src="${getFavicon(i.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${i.emoji}'">
      </div>
      <div class="app-icon-label">${i.title}</div>
    </a>`).join('');
}

// ========== Folder Animation ==========
let folderOpenPos=null;

function openFolder(i,el){
  const f=DATA.folders[i];
  const rect=el.getBoundingClientRect();
  folderOpenPos={x:rect.left+rect.width/2,y:rect.top+rect.height/2};
  
  document.getElementById('folderTitle').textContent=f.name;
  document.getElementById('folderGrid').innerHTML=f.links.map(l=>`
    <a class="app-icon" href="${l.url}" target="_blank" rel="noopener" style="width:65px">
      <div class="app-icon-img squircle" style="--icon-bg:${getColor(l.title)};width:52px;height:52px;font-size:20px;font-weight:600;border-radius:12px">
        <img src="${getFavicon(l.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${l.title.charAt(0)}'">
      </div>
      <div class="app-icon-label" style="max-width:65px;font-size:10px;margin-top:4px">${l.title}</div>
    </a>`).join('');
  
  const overlay=document.getElementById('folderOverlay');
  const wrapper=document.getElementById('folderWrapper');
  
  overlay.classList.add('open');
  
  // Set initial position (at folder location)
  const panelWidth=Math.min(360,window.innerWidth-40);
  const panelHeight=Math.min(400,window.innerHeight-200);
  
  wrapper.style.left=`${folderOpenPos.x}px`;
  wrapper.style.top=`${folderOpenPos.y}px`;
  wrapper.style.width='60px';
  wrapper.style.height='60px';
  wrapper.style.opacity='0.8';
  wrapper.style.transform='translate(-50%,-50%) scale(0.8)';
  
  // Animate to center
  requestAnimationFrame(()=>{
    wrapper.style.left='50%';
    wrapper.style.top='45%';
    wrapper.style.width=`${panelWidth}px`;
    wrapper.style.height='auto';
    wrapper.style.opacity='1';
    wrapper.style.transform='translate(-50%,-50%) scale(1)';
  });
}

function closeFolder(){
  const overlay=document.getElementById('folderOverlay');
  const wrapper=document.getElementById('folderWrapper');
  
  if(folderOpenPos){
    // Animate back to folder position
    wrapper.style.left=`${folderOpenPos.x}px`;
    wrapper.style.top=`${folderOpenPos.y}px`;
    wrapper.style.width='60px';
    wrapper.style.height='60px';
    wrapper.style.opacity='0';
    wrapper.style.transform='translate(-50%,-50%) scale(0.8)';
    
    setTimeout(()=>{
      overlay.classList.remove('open');
      folderOpenPos=null;
    },300);
  }else{
    overlay.classList.remove('open');
  }
}

// ========== Search ==========
function openSearch(){
  const overlay=document.getElementById('searchOverlay');
  overlay.classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}

function closeSearch(){
  const overlay=document.getElementById('searchOverlay');
  overlay.classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
  document.getElementById('searchCancel').classList.remove('show');
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchCancel').classList.toggle('show',q.length>0);
  
  if(!q){document.getElementById('searchResults').innerHTML='';return}
  
  const all=[];
  DATA.folders.forEach(f=>f.links.forEach(l=>all.push({...l,folder:f.name})));
  DATA.dock.forEach(l=>all.push({...l,folder:'Dock'}));
  
  const r=all.filter(l=>l.title.toLowerCase().includes(q)||l.url.toLowerCase().includes(q)||l.folder.toLowerCase().includes(q));
  
  if(!r.length){
    document.getElementById('searchResults').innerHTML='<div class="search-empty">没有找到结果</div>';
    return;
  }
  
  document.getElementById('searchResults').innerHTML=r.map(x=>`
    <a class="search-result-item" href="${x.url}" target="_blank" rel="noopener">
      <div class="search-result-icon squircle" style="background:${getColor(x.title)}">
        <img src="${getFavicon(x.url)}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${x.title.charAt(0)}'">
      </div>
      <div class="search-result-info">
        <div class="search-result-title">${x.title}</div>
        <div class="search-result-url">${getDomain(x.url)} · ${x.folder}</div>
      </div>
    </a>`).join('');
}

// ========== Clock ==========
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

// ========== Touch Gestures ==========
let tsy=0;
document.addEventListener('touchstart',e=>{tsy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const tey=e.changedTouches[0].clientY;
  if(tsy-tey>80&&!document.querySelector('.folder-overlay.open')&&!document.querySelector('.search-overlay.open')){
    openSearch();
  }
},{passive:true});

// ========== Keyboard ==========
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeFolder();
    closeSearch();
  }
});

// ========== Init ==========
renderDesktop();
renderDock();
updateClock();
setInterval(updateClock,10000);
</script>
