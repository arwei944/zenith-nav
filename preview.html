<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith — Minimal Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* === RESET & VARIABLES === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a1a;--surface:#1e1e1e;--surface-secondary:#252525;--surface-hover:#2a2a2a;
--text:#f5f2ed;--text-secondary:#a8a29e;--text-tertiary:#6b6560;
--accent:#e8a849;--border:#333;
--radius:12px;--sidebar-surface:#f5f2ed;--sidebar-text:#2c2c2c;--sidebar-text-secondary:#555;--sidebar-text-tertiary:#888;--sidebar-border:#ddd;
}
.light{
--bg:#fafafa;--surface:#fff;--surface-secondary:#f0f0f0;--surface-hover:#e8e8e8;
--text:#1a1a1a;--text-secondary:#555;--text-tertiary:#999;
--accent:#c78c30;--border:#e0e0e0;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* === LAYOUT === */
.app{display:flex;flex-direction:column;height:100vh;position:relative}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;position:relative;z-index:10}
.top-bar-left{display:flex;align-items:center;gap:12px}
.site-name{font-size:18px;font-weight:600;letter-spacing:-.3px}
.mod-key{font-size:11px;color:var(--text-tertiary);background:var(--surface-secondary);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.top-bar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .2s;color:var(--text-secondary)}
.icon-btn:hover{background:var(--surface-hover)}
.icon-btn svg{width:18px;height:18px}

/* === CONTENT === */
.content-wrapper{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:48px;margin-top:64px;overflow-y:auto;padding:0 24px 24px}
.hero{text-align:center}
.hero h1{font-size:clamp(28px,5vw,48px);font-weight:300;letter-spacing:-1px;margin-bottom:4px}
.hero .desc{font-size:14px;color:var(--text-tertiary)}
.search-box{position:relative;width:100%;max-width:560px}
.search-box input{width:100%;padding:12px 16px 12px 44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,168,73,.15)}
.search-box input::placeholder{color:var(--text-tertiary)}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-tertiary)}

/* === QUICK LAUNCH === */
.quick-launch{width:100%;max-width:560px}
.quick-launch-row{display:flex;flex-wrap:wrap;gap:28px;justify-content:center}
.ql-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;width:64px;cursor:grab}
.ql-item img{width:32px;height:32px;border-radius:8px}
.ql-title{font-size:11px;color:var(--text-tertiary);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:64px}
.ql-add{display:flex;flex-direction:column;align-items:center;gap:8px;width:64px;cursor:pointer;color:var(--text-tertiary);opacity:.6;transition:opacity .2s}
.ql-add:hover{opacity:1}
.ql-add-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--border);border-radius:8px;font-size:18px}
.ql-add span{font-size:11px}
.ql-form{display:flex;gap:8px;width:100%;max-width:560px;margin-top:8px}
.ql-form input{flex:1;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.ql-form input:focus{border-color:var(--accent)}
.btn-sm{padding:6px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-weight:500;transition:opacity .2s}
.btn-sm:hover{opacity:.85}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}

/* === CARD CANVAS === */
.card-canvas{position:relative;width:100%;max-width:1200px;min-height:200px}

/* === CARD BOX === */
.card-box{position:absolute;background:var(--card-bg,var(--surface));border:1px solid var(--border);border-radius:var(--radius);overflow:clip;display:flex;flex-direction:column;transition:box-shadow .2s;min-width:180px;min-height:120px}
.card-box:hover{box-shadow:0 4px 20px rgba(0,0,0,.15)}
.card-box.dragging{opacity:.85;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.card-box-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:grab;user-select:none;border-bottom:1px solid var(--border)}
.card-box-header:active{cursor:grabbing}
.cat-name{font-size:13px;font-weight:500}
.cat-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s}
.card-box:hover .cat-actions{opacity:1}
.cat-actions button{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text-tertiary);transition:background .15s,color .15s}
.cat-actions button:hover{background:var(--surface-hover);color:var(--text)}
.cat-actions button svg{width:14px;height:14px}
.card-box-body{flex:1;overflow-y:auto;padding:4px 0}
.link-row{display:flex;align-items:center;gap:8px;padding:6px 12px;position:relative;transition:all .15s;border-radius:6px;margin:0 4px}
.link-row:hover{background:var(--card-row-hover,var(--surface-hover));padding-left:10px}
.link-row img{width:16px;height:16px;border-radius:4px;flex-shrink:0}
.link-title{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-actions{position:absolute;right:4px;top:50%;transform:translateY(-50%);display:flex;gap:2px;opacity:0;transition:opacity .15s}
.link-row:hover .link-actions{opacity:1}
.link-actions button{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--text-tertiary);transition:background .15s}
.link-actions button:hover{background:var(--surface-hover);color:var(--text)}
.link-actions button svg{width:12px;height:12px}
.inline-form{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border)}
.inline-form input{flex:1;padding:4px 8px;background:var(--surface-secondary);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none}
.inline-form input:focus{border-color:var(--accent)}
.card-box-resize{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;opacity:.3;transition:opacity .2s}
.card-box:hover .card-box-resize{opacity:.6}
.card-box-resize::after{content:'';position:absolute;right:4px;bottom:4px;width:8px;height:8px;border-right:2px solid var(--text-tertiary);border-bottom:2px solid var(--text-tertiary)}

/* === SETTINGS DRAWER === */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.settings-overlay.active{opacity:1;pointer-events:auto}
.settings-drawer{position:fixed;top:0;right:0;width:300px;height:100vh;background:#f5f2ed;color:var(--sidebar-text,#2c2c2c);transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);z-index:101;overflow-y:auto;padding:20px}
.settings-drawer.active{transform:translateX(0)}
.settings-drawer .desc{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .sec-value{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .sec-arrow{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .label{color:var(--sidebar-text-secondary,#555)}
.settings-drawer .setting-row .label{color:var(--sidebar-text-secondary,#555)}
.settings-drawer .section-title{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .setting-label{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .data-btn{color:var(--sidebar-text-secondary,#555)}
.settings-drawer .data-btn.danger{color:#e53e3e}
.settings-drawer .divider{background:var(--sidebar-border,#ddd)}
.settings-drawer .slider-label{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .slider-value{color:var(--sidebar-text-secondary,#555)}
.settings-drawer .pill{color:var(--sidebar-text-tertiary,#888)}
.settings-drawer .pill.active{background:var(--accent);color:#fff}
.settings-drawer .setting-input{color:var(--sidebar-text,#2c2c2c)}
.settings-drawer .setting-input::placeholder{color:var(--sidebar-text-tertiary,#aaa)}
.settings-drawer .switch .thumb{background:var(--sidebar-text,#2c2c2c)}
.settings-drawer .switch{background:#e8e5e0;border-color:#ddd}
.settings-drawer .brightness-slider input[type="range"]{background:#e8e5e0}
.settings-drawer .brightness-slider input[type="range"]::-webkit-slider-thumb{background:var(--accent);border-color:#f5f2ed;box-shadow:0 0 0 1px #ddd}
.settings-drawer #contrastBtn{background:#e8e5e0;border-color:#ddd;color:var(--sidebar-text-tertiary,#888)}
.settings-drawer h2{color:var(--sidebar-text,#2c2c2c)}
.settings-close{position:absolute;top:16px;right:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--sidebar-text-tertiary,#888);transition:background .15s}
.settings-close:hover{background:rgba(0,0,0,.06)}
.settings-section{margin-bottom:4px}
.settings-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;user-select:none}
.settings-section-header h3{font-size:13px;font-weight:500;color:var(--sidebar-text,#2c2c2c)}
.settings-section-body{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s;opacity:0}
.settings-section-body.open{max-height:2000px;opacity:1}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.setting-row-inline{margin-bottom:14px}
.label{font-size:13px;color:var(--sidebar-text-secondary,#555)}
.setting-input{width:100%;padding:8px 12px;background:rgba(0,0,0,.04);border:1px solid var(--sidebar-border,#ddd);border-radius:8px;color:var(--sidebar-text,#2c2c2c);font-size:13px;outline:none}
.setting-input:focus{border-color:var(--accent)}
.divider{height:1px;background:var(--sidebar-border,#ddd);margin:16px 0}
.section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--sidebar-text-tertiary,#888);margin-bottom:8px}
.pill{padding:4px 10px;border-radius:6px;font-size:12px;border:1px solid var(--sidebar-border,#ddd);background:transparent;transition:all .15s;color:var(--sidebar-text-tertiary,#888)}
.pill:hover{background:rgba(0,0,0,.05)}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.switch{position:relative;width:40px;height:22px;border-radius:11px;background:#e8e5e0;border:1px solid #ddd;cursor:pointer;transition:background .2s}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch .thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--sidebar-text,#2c2c2c);transition:transform .2s}
.switch.on .thumb{transform:translateX(18px);background:#fff}
.data-btn{padding:8px 14px;border:1px solid var(--sidebar-border,#ddd);border-radius:8px;font-size:12px;transition:all .15s;color:var(--sidebar-text-secondary,#555)}
.data-btn:hover{background:rgba(0,0,0,.05)}
.data-btn.danger{color:#e53e3e;border-color:#e53e3e}
.data-btn.danger:hover{background:rgba(229,62,62,.08)}
.color-input{width:32px;height:32px;border:1px solid var(--sidebar-border,#ddd);border-radius:8px;cursor:pointer;padding:0;background:none}
.brightness-slider{margin-top:8px}
.slider-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.slider-value{color:var(--sidebar-text-secondary,#555)}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#e8e5e0;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #f5f2ed;box-shadow:0 0 0 1px #ddd}
.bg-picker-trigger{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,.04);border:1px solid var(--sidebar-border,#ddd);border-radius:8px;cursor:pointer;transition:all .15s}
.bg-picker-trigger:hover{background:rgba(0,0,0,.07)}
.trigger-preview{display:flex;gap:4px}
.trigger-preview span{width:16px;height:16px;border-radius:4px}
.trigger-text{font-size:12px;color:var(--sidebar-text-secondary,#555)}
.trigger-arrow{font-size:10px;color:var(--sidebar-text-tertiary,#888);margin-left:auto}
.bg-presets-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.bg-presets-panel.open{max-height:300px}
.bg-presets-panel-inner{padding:8px 0}
.color-presets-group-label{font-size:11px;color:var(--sidebar-text-tertiary,#888);margin:8px 0 4px}
.color-presets-row{display:flex;flex-wrap:wrap;gap:6px}
.color-preset-item{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative}
.color-preset-item:hover{border-color:var(--accent)}
.color-preset-item.active{border-color:var(--accent)}
.preset-name{display:none}

/* === SEARCH DIALOG === */
.search-dialog{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s}
.search-dialog.active{opacity:1;pointer-events:auto}
.search-dialog-inner{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.search-dialog input{width:100%;padding:16px;border:none;background:transparent;color:var(--text);font-size:16px;outline:none}
.search-dialog input::placeholder{color:var(--text-tertiary)}
.search-results{max-height:300px;overflow-y:auto}
.search-result-item{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.search-result-item:hover,.search-result-item.active{background:var(--surface-hover)}
.search-result-item img{width:20px;height:20px;border-radius:4px}
.search-result-item .sr-title{font-size:14px}
.search-result-item .sr-cat{font-size:11px;color:var(--text-tertiary);margin-left:auto}
.search-empty{padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
</style>
</head>
<body class="dark">
<div class="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="site-name" id="siteName">Zenith</span>
      <span class="mod-key" id="modKey">⌘</span><span style="font-size:11px;color:var(--text-tertiary)">K 搜索</span>
    </div>
    <div class="top-bar-right">
      <button class="icon-btn" id="addCatBtn" aria-label="添加分类" title="添加分类">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8M8 12h8"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div class="content-wrapper" id="contentWrapper">
    <div class="hero" id="heroSection">
      <h1 id="greeting">Good morning</h1>
      <p class="desc" id="timeDisplay">00:00</p>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Search bookmarks...
