<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith — Minimal Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --surface: #fafafa;
  --surface-secondary: #f5f5f5;
  --surface-hover: #eeeeee;
  --text-primary: #111111;
  --text-secondary: #666666;
  --text-tertiary: #999999;
  --accent: #888888;
  --accent-hover: #aaaaaa;
  --border: #e8e8e8;
}

.dark {
  --surface: #1a1a1a;
  --surface-secondary: #222222;
  --surface-hover: #2a2a2a;
  --text-primary: #e8e8e8;
  --text-secondary: #999999;
  --text-tertiary: #666666;
  --accent: #888888;
  --accent-hover: #aaaaaa;
  --border: #2a2a2a;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--surface);
  color: var(--text-primary);
  transition: background-color 0.5s ease, color 0.5s ease;
  min-height: 100vh;
  overflow-x: hidden;
}

::selection { background-color: var(--accent); color: var(--surface); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--text-tertiary) 40%, transparent); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

*:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
input::placeholder { color: var(--text-tertiary); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ========== LAYOUT ========== */
.app { min-height: 100vh; display: flex; flex-direction: column; }

/* ========== TOP BAR ========== */
.top-bar {
  width: 100%; padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; animation: fadeIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
}
.logo-area { display: flex; align-items: center; gap: 10px; min-width: 0; flex-shrink: 0; }
.logo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-tertiary);
  transition: background 0.3s ease;
}
.logo-name { font-size: 13px; font-weight: 400; letter-spacing: 0.06em; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.search-area { position: relative; flex: 1; max-width: 400px; margin: 0 32px; }
.search-icon { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; opacity: 0.6; transition: opacity 0.3s ease; }
.search-input {
  width: 100%; background: transparent; font-size: 13px; font-weight: 400; color: var(--text-primary);
  padding: 8px 56px 8px 22px; outline: none;
  border: none; border-bottom: 1px solid transparent;
  transition: border-color 0.4s cubic-bezier(0.16,1,0.3,1);
}
.search-input:focus { border-bottom-color: var(--text-secondary); }
.search-input:focus ~ .search-icon { opacity: 1; }
.search-input:not(:focus):hover { border-bottom-color: color-mix(in srgb, var(--text-tertiary) 25%, transparent); }
.search-kbd { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; gap: 2px; pointer-events: none; }
.search-kbd kbd { font-size: 10px; color: color-mix(in srgb, var(--text-tertiary) 40%, transparent); font-family: 'SF Mono', ui-monospace, monospace; }

.top-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; color: var(--text-tertiary); transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.icon-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
.icon-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }

/* ========== SEARCH RESULTS ========== */
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; z-index: 50;
  background: color-mix(in srgb, var(--surface) 85%, transparent);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  border-radius: 10px; overflow: hidden;
  opacity: 0; transform: translateY(-4px); pointer-events: none;
  transition: opacity 0.2s cubic-bezier(0.16,1,0.3,1), transform 0.2s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 8px 32px color-mix(in srgb, var(--surface) 80%, black);
}
.search-results.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
.search-group-label { padding: 8px 14px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: color-mix(in srgb, var(--text-tertiary) 60%, transparent); font-weight: 500; }
.search-result-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; text-align: left; transition: background-color 0.15s ease; border-radius: 6px; margin: 0 4px;
}
.search-result-item:hover, .search-result-item.selected { background: var(--surface-hover); }
.search-result-item .title { font-size: 13px; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-item .url { font-size: 11px; color: color-mix(in srgb, var(--text-tertiary) 40%, transparent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }

/* ========== SEARCH DIALOG (Cmd+K) ========== */
.search-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.search-overlay.active { opacity: 1; pointer-events: auto; }
.search-dialog {
  position: fixed; left: 50%; top: 20%; z-index: 101;
  width: 90%; max-width: 520px; transform: translateX(-50%) translateY(-8px) scale(0.98);
  background: color-mix(in srgb, var(--surface) 90%, transparent);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
  border-radius: 14px; overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s cubic-bezier(0.16,1,0.3,1), transform 0.25s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 16px 64px color-mix(in srgb, var(--surface) 70%, black), 0 0 0 1px color-mix(in srgb, var(--border) 20%, transparent);
}
.search-dialog.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0) scale(1); }
.search-dialog-input-area { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid color-mix(in srgb, var(--border) 25%, transparent); }
.search-dialog-input-area svg { width: 16px; height: 16px; color: var(--text-tertiary); flex-shrink: 0; }
.search-dialog-input {
  flex: 1; background: transparent; font-size: 14px; font-weight: 400; color: var(--text-primary);
  outline: none;
}
.search-dialog-input::placeholder { color: color-mix(in srgb, var(--text-tertiary) 45%, transparent); }
.search-dialog-results { max-height: 360px; overflow-y: auto; padding: 6px 0; }
.search-dialog-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 18px; border-top: 1px solid color-mix(in srgb, var(--border) 15%, transparent);
  font-size: 10px; color: color-mix(in srgb, var(--text-tertiary) 35%, transparent);
}
.search-dialog-footer .hints { display: flex; gap: 12px; align-items: center; }
.search-dialog-footer .hints span { display: flex; align-items: center; gap: 4px; }
.search-dialog-footer kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px; padding: 0 3px;
  font-size: 9px; font-family: 'SF Mono', ui-monospace, monospace;
  background: color-mix(in srgb, var(--surface-hover) 60%, transparent); border-radius: 3px;
}

/* ========== MAIN CONTENT ========== */
.main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 32px; }
.content-wrapper { width: 100%; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; margin-top: 64px; gap: 48px; }

/* ========== TIME DISPLAY ========== */
.time-display { display: flex; flex-direction: column; align-items: center; gap: 6px; opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }
.time-display .time { font-size: 64px; font-weight: 200; letter-spacing: -0.03em; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.time-display .greeting { font-size: 15px; font-weight: 400; color: var(--text-secondary); letter-spacing: 0.01em; }
.time-display .date { font-size: 12px; font-weight: 400; color: var(--text-tertiary); letter-spacing: 0.02em; margin-top: 2px; }

/* ========== QUICK LAUNCH ========== */
.quick-launch { width: 100%; opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
.quick-launch-row { display: flex; align-items: flex-start; justify-content: center; gap: 28px; overflow-x: auto; padding: 8px 0; }
.quick-launch-row::-webkit-scrollbar { display: none; }
.ql-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  flex-shrink: 0; cursor: pointer; position: relative; user-select: none;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.ql-item:hover { transform: translateY(-2px); }
.ql-item img {
  width: 36px; height: 36px; border-radius: 10px;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease;
}
.ql-item:hover img { transform: scale(1.08); box-shadow: 0 4px 12px color-mix(in srgb, var(--surface) 60%, black); }
.ql-item .ql-title { font-size: 11px; font-weight: 400; color: var(--text-tertiary); white-space: nowrap; max-width: 72px; overflow: hidden; text-overflow: ellipsis; transition: color 0.25s ease; }
.ql-item:hover .ql-title { color: var(--text-secondary); }
.ql-add {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  flex-shrink: 0; color: var(--text-tertiary); transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
}
.ql-add:hover { color: var(--text-secondary); transform: translateY(-2px); }
.ql-add-icon {
  width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  border: 1px dashed color-mix(in srgb, var(--text-tertiary) 25%, transparent);
  transition: border-color 0.3s ease, background 0.3s ease;
}
.ql-add:hover .ql-add-icon { border-color: color-mix(in srgb, var(--text-secondary) 35%, transparent); background: color-mix(in srgb, var(--surface-hover) 50%, transparent); }
.ql-add-icon svg { width: 14px; height: 14px; stroke-width: 1.5; }
.ql-add span { font-size: 11px; font-weight: 400; }

/* Inline add form */
.ql-form {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-top: 16px; overflow: hidden;
  max-height: 0; opacity: 0; transition: max-height 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease, margin 0.25s ease;
}
.ql-form.active { max-height: 60px; opacity: 1; }
.ql-form input {
  background: transparent; font-size: 13px; font-weight: 400; color: var(--text-primary);
  padding: 6px 8px; outline: none;
  border: none; border-bottom: 1px solid color-mix(in srgb, var(--text-tertiary) 25%, transparent);
  transition: border-color 0.3s ease;
}
.ql-form input:focus { border-bottom-color: var(--text-secondary); }
.ql-form .btn-text { font-size: 12px; font-weight: 500; color: var(--text-tertiary); transition: color 0.2s ease; }
.ql-form .btn-text:hover { color: var(--text-primary); }
.ql-form .btn-text:disabled { opacity: 0.3; cursor: not-allowed; }

/* ========== CATEGORIES ========== */
.categories { width: 100%; opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
.category { min-width: 0; }
.category-header { display: flex; align-items: center; gap: 8px; padding: 10px 0 6px; }
.category-header .collapse-btn { color: var(--text-tertiary); transition: color 0.2s ease; flex-shrink: 0; }
.category-header .collapse-btn:hover { color: var(--text-secondary); }
.category-header .collapse-btn svg { width: 14px; height: 14px; stroke-width: 1.5; }
.category-header .cat-name {
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary); transition: color 0.2s ease; cursor: pointer;
}
.category-header .cat-name:hover { color: var(--text-secondary); }
.category-header .cat-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.25s ease; }
.category-header:hover .cat-actions { opacity: 1; }
.category-header .cat-actions button { padding: 4px; color: var(--text-tertiary); transition: color 0.2s ease; border-radius: 4px; }
.category-header .cat-actions button:hover { color: var(--text-primary); background: var(--surface-hover); }
.category-header .cat-actions button svg { width: 12px; height: 12px; }

.cat-links { margin-left: 22px; overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease; }
.cat-links.open { max-height: 600px; opacity: 1; }

.link-row {
  display: flex; align-items: center; gap: 10px; padding: 6px 6px; border-radius: 6px;
  position: relative; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
}
.link-row:hover { background: var(--card-row-hover, var(--surface-hover)); padding-left: 10px; }
.link-row .grip { opacity: 0; transition: opacity 0.2s ease; flex-shrink: 0; pointer-events: none; }
.link-row:hover .grip { opacity: 0.25; }
.link-row .grip svg { width: 10px; height: 10px; color: var(--text-tertiary); }
.link-row img { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
.link-row .link-title {
  font-size: 13px; font-weight: 400; color: var(--text-secondary); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: color 0.2s ease;
}
.link-row:hover .link-title { color: var(--text-primary); }
.link-row .ext-icon { opacity: 0; transition: opacity 0.2s ease; flex-shrink: 0; pointer-events: none; }
.link-row:hover .ext-icon { opacity: 0.3; }
.link-row .ext-icon svg { width: 11px; height: 11px; color: var(--text-tertiary); }
.link-row .link-actions {
  position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
  display: flex; gap: 1px; opacity: 0; transition: opacity 0.2s ease;
}
.link-row:hover .link-actions { opacity: 1; }
.link-row .link-actions button { padding: 4px; color: var(--text-tertiary); transition: color 0.15s ease; border-radius: 4px; }
.link-row .link-actions button:hover { color: var(--text-primary); background: var(--surface-hover); }
.link-row .link-actions button svg { width: 12px; height: 12px; }

.add-category {
  margin-left: 22px; padding: 10px 0 4px; display: flex; align-items: center; gap: 6px;
  color: var(--text-tertiary); transition: color 0.2s ease;
}
.add-category:hover { color: var(--text-secondary); }
.add-category svg { width: 12px; height: 12px; stroke-width: 1.5; }
.add-category span { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

/* ========== CARD BOXES (Free-positioned categories) ========== */
.card-canvas {
  position: relative;
  width: 100%;
  min-height: 400px;
}
.card-box {
  position: absolute;
  min-width: 180px;
  min-height: 120px;
  background: var(--card-bg, var(--surface));
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: clip;
  display: flex;
  flex-direction: column;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: box-shadow 0.2s ease;
  user-select: none;
}
.card-box:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.card-box.dragging { box-shadow: 0 8px 32px rgba(0,0,0,0.35); z-index: 100; opacity: 0.92; }
.card-box-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  cursor: grab;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.card-box-header:active { cursor: grabbing; }
.card-box-header .cat-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-box-header .cat-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s ease; }
.card-box:hover .cat-actions { opacity: 1; }
.card-box-header .cat-actions button { padding: 3px; color: var(--text-tertiary); border: none; background: none; cursor: pointer; border-radius: 4px; transition: all 0.15s ease; display: flex; align-items: center; }
.card-box-header .cat-actions button:hover { color: var(--text-primary); background: var(--surface-hover); }
.card-box-header .cat-actions button svg { width: 12px; height: 12px; }
.card-box-body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.card-box-body::-webkit-scrollbar { width: 3px; }
.card-box-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.card-box .link-row { padding: 6px 12px; gap: 8px; }
.card-box .link-row .grip { display: none; }
.card-box .inline-form { padding: 4px 12px 8px; }
/* Resize handle */
.card-box-resize {
  position: absolute;
  right: 0; bottom: 0;
  width: 16px; height: 16px;
  cursor: nwse-resize;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.card-box:hover .card-box-resize { opacity: 0.4; }
.card-box-resize::after {
  content: '';
  position: absolute;
  right: 4px; bottom: 4px;
  width: 8px; height: 8px;
  border-right: 2px solid var(--text-tertiary);
  border-bottom: 2px solid var(--text-tertiary);
}
/* Add category card */
.add-card-box {
  position: absolute;
  width: 180px;
  min-height: 120px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.2s ease;
}
.add-card-box:hover { border-color: var(--text-secondary); color: var(--text-secondary); background: var(--surface-hover); }
.add-card-box svg { width: 20px; height: 20px; stroke-width: 1.5; }
.add-card-box span { font-size: 11px; font-weight: 500; }

/* Inline add link form */
.inline-form {
  display: flex; align-items: center; gap: 8px; padding: 6px 6px;
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease, padding 0.25s ease;
}
.inline-form.active { max-height: 50px; opacity: 1; }
.inline-form input {
  flex: 1; min-width: 0; background: transparent; font-size: 13px; font-weight: 400; color: var(--text-primary);
  outline: none; border: none; border-bottom: 1px solid color-mix(in srgb, var(--text-tertiary) 25%, transparent);
  transition: border-color 0.3s ease;
}
.inline-form input:focus { border-bottom-color: var(--text-secondary); }
.inline-form .btn-sm { font-size: 12px; font-weight: 500; color: var(--text-tertiary); transition: color 0.2s ease; flex-shrink: 0; }
.inline-form .btn-sm:hover { color: var(--text-primary); }
.inline-form .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

/* ========== SETTINGS DRAWER ========== */
.settings-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.settings-overlay.active { opacity: 1; pointer-events: auto; }
.settings-drawer {
  position: fixed; right: 0; top: 0; z-index: 51; height: 100%; width: 100%; max-width: 300px;
  background: #f5f2ed;
  border-left: 1px solid var(--sidebar-border, var(--border));
  padding: 24px 20px; overflow-y: auto;
  color: var(--sidebar-text, #2c2c2c);
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
.settings-drawer .desc { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .sec-value { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .sec-arrow { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .label { color: var(--sidebar-text-secondary, #555); }
.settings-drawer .setting-row .label { color: var(--sidebar-text-secondary, #555); }
.settings-drawer .section-title { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .setting-label { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .data-btn { color: var(--sidebar-text-secondary, #555); }
.settings-drawer .data-btn.danger { color: #e53e3e; }
.settings-drawer .divider { background: var(--sidebar-border, #ddd); }
.settings-drawer .slider-label { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .slider-value { color: var(--sidebar-text-secondary, #555); }
.settings-drawer .pill { color: var(--sidebar-text-tertiary, #888); }
.settings-drawer .pill.active { background: var(--accent); color: #fff; }
.settings-drawer .setting-input { color: var(--sidebar-text, #2c2c2c); }
.settings-drawer .setting-input::placeholder { color: var(--sidebar-text-tertiary, #aaa); }
.settings-drawer .switch .thumb { background: var(--sidebar-text, #2c2c2c); }

// ========== UTILS ==========
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function favicon(url) { try { return 'https://www.google.com/s2/favicons?domain='+new URL(url).hostname+'&sz=32'; } catch{return '';} }
function fuzzy(q, t) { q=q.toLowerCase(); t=t.toLowerCase(); if(t.includes(q)) return true; let qi=0; for(let i=0;i<t.length&&qi<q.length;i++) if(t[i]===q[qi]) qi++; return qi===q.length; }
function getGreeting() { const h=new Date().getHours(); if(h<6) return 'Good night'; if(h<12) return 'Good morning'; if(h<18) return 'Good afternoon'; return 'Good evening'; }
function isMac() { return navigator.platform.toUpperCase().indexOf('MAC')>=0; }
function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
  let h=0, s=0;
  if(max!==min){ const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    if(max===r) h=((g-b)/d+(g<b?6:0))/6; else if(max===g) h=((b-r)/d+2)/6; else h=((r-g)/d+4)/6; }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; return l-a*Math.max(Math.min(k-3,9-k,1),-1); };
  return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

// Relative luminance (WCAG)
function luminance(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const toLinear = c => c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
}

// Derive all UI colors from a background color for optimal contrast
// contrast: 0-100, 50=default, lower=softer, higher=sharper
function deriveColorsFromBg(bgHex, contrast = 50) {
  const lum = luminance(bgHex);
  const isLight = lum > 0.35;
  // contrast factor: 0.5~1.5 mapped from 0~100
  const cf = 0.5 + (contrast / 100);

  if (isLight) {
    // Base dark text, blend toward bg for low contrast
    const primaryL = Math.round(7 * (2 - cf));       // 7~14 → blend with bg
    const secondaryL = Math.round(33 * (2 - cf));     // 33~66
    const tertiaryL = Math.round(60 * (2 - cf));      // 60~100
    return {
      '--surface': bgHex,
      '--surface-secondary': darkenHex(bgHex, Math.round(4 * cf)),
      '--surface-hover': darkenHex(bgHex, Math.round(8 * cf)),
      '--text-primary': isLight ? hslToHex(0, 0, Math.min(primaryL, 30)) : '#e8e8e8',
      '--text-secondary': isLight ? hslToHex(0, 0, Math.min(secondaryL, 65)) : hslToHex(0, 0, Math.max(40, secondaryL)),
      '--text-tertiary': isLight ? hslToHex(0, 0, Math.min(tertiaryL, 85)) : hslToHex(0, 0, Math.max(25, tertiaryL)),
      '--border': darkenHex(bgHex, Math.round(10 * cf)),
    };
  } else {
    // Base light text, blend toward bg for low contrast
    const primaryL = Math.round(91 - 7 * (2 - cf));   // 84~91
    const secondaryL = Math.round(60 - 9 * (2 - cf));  // 51~60
    const tertiaryL = Math.round(40 - 10 * (2 - cf));   // 30~40
    return {
      '--surface': bgHex,
      '--surface-secondary': lightenHex(bgHex, Math.round(5 * cf)),
      '--surface-hover': lightenHex(bgHex, Math.round(10 * cf)),
      '--text-primary': hslToHex(0, 0, primaryL),
      '--text-secondary': hslToHex(0, 0, secondaryL),
      '--text-tertiary': hslToHex(0, 0, tertiaryL),
      '--border': lightenHex(bgHex, Math.round(12 * cf)),
    };
  }
}

function darkenHex(hex, amount) {
  const [h,s,l] = hexToHsl(hex);
  return hslToHex(h, s, Math.max(0, l - amount));
}

function lightenHex(hex, amount) {
  const [h,s,l] = hexToHsl(hex);
  return hslToHex(h, s, Math.min(100, l + amount));
}

// ========== TIME ==========
function updateTime() {
  const now = new Date();
  const el = document.getElementById('timeText');
  const gr = document.getElementById('greetingText');
  const dt = document.getElementById('dateText');
  if(el && state.settings.showTime) el.textContent = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
  if(gr && state.settings.showGreeting) gr.textContent = getGreeting();
  if(dt && state.settings.showTime) dt.textContent = now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('timeDisplay').style.display = (state.settings.showTime||state.settings.showGreeting) ? '' : 'none';
}

// ========== THEME ==========
function applyTheme(theme) {
  if(theme==='dark') document.body.className='dark';
  else if(theme==='light') document.body.className='';
  else document.body.className = window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'';
  const icon = document.getElementById('themeIcon');
  const isDark = document.body.classList.contains('dark');
  icon.innerHTML = isDark ? ICONS.sun : ICONS.moon;
  // Update background
  applyBackground();
}

function applyBackground() {
  const bg = state.settings.background;
  let effectiveBg = '#1a1a1a';

  if(bg.type==='solid') {
    effectiveBg = bg.value;
    document.body.style.background = bg.value;
    document.body.style.backgroundImage = '';
  } else if(bg.type==='gradient') {
    const p = bg.value.split(',');
    effectiveBg = p[0] || '#1a1a1a';
    document.body.style.background = `linear-gradient(${p[2]||135}deg, ${p[0]||'#1a1a1a'}, ${p[1]||'#2a2a2a'})`;
    document.body.style.backgroundImage = '';
  } else if(bg.type==='api') {
    effectiveBg = '#111111';
    loadApiImage(bg.value);
    return; // colors will be applied after image loads
  } else {
    // unsplash
    const id = bg.value || '1065976';
    effectiveBg = '#1a1a1a';
    document.body.style.background = '';
    document.body.style.backgroundImage = `url(https://source.unsplash.com/collection/${id}/1920x1080/daily)`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
  }

  // Auto-derive all UI colors from background luminance + contrast
  const colors = deriveColorsFromBg(effectiveBg, state.settings.contrast || 50);
  const root = document.documentElement;
  Object.entries(colors).forEach(([prop, val]) => root.style.setProperty(prop, val));
}

// API image sources - using eyabc.cn API (302 redirect to image)
const API_IMAGE_SOURCES = {
  beauty: { name: '美女', url: 'https://api.eyabc.cn/api/picture/beauty' },
  anime: { name: '动漫', url: 'https://api.eyabc.cn/api/picture/dong_man' },
  landscape: { name: '风景', url: 'https://api.eyabc.cn/api/picture/scenery' },
};

function loadApiImage(category) {
  const source = API_IMAGE_SOURCES[category];
  if(!source) return;
  const apiUrl = source.url + '?r=' + Math.random().toString(36).slice(2);

  // Show loading state
  document.body.style.background = '#1a1a1a';
  document.body.style.backgroundImage = '';

  // Fetch to resolve the redirect, then apply the final image URL
  fetch(apiUrl, { mode: 'cors', redirect: 'follow' })
    .then(response => {
      if(!response.ok) throw new Error('API error');
      return response.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      document.body.style.background = '';
      document.body.style.backgroundImage = `url(${url})`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundRepeat = 'no-repeat';
      document.body.style.backgroundAttachment = 'fixed';
      // Apply dark overlay colors for readability
      const colors = deriveColorsFromBg('#111111', state.settings.contrast || 50);
      const root = document.documentElement;
      Object.entries(colors).forEach(([prop, val]) => root.style.setProperty(prop, val));
    })
    .catch(() => {
      document.body.style.background = '#1a1a1a';
      document.body.style.backgroundImage = '';
    });
}

function applyAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-hover', color + 'dd');
}

// ========== RENDER QUICK LAUNCH ==========
function renderQuickLaunch() {
  const row = document.getElementById('quickLaunchRow');
  row.innerHTML = '';
  state.quickLaunch.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ql-item';
    div.draggable = true;
    div.innerHTML = `
      <a href="${item.url}" target="_blank" rel="noopener" style="display:flex;flex-direction:column;align-items:center;gap:8px" draggable="false">
        <img src="${favicon(item.url)}" alt="" draggable="false" onerror="this.style.display='none'">
        <span class="ql-title">${item.title}</span>
      </a>
      <button style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-hover);color:var(--text-tertiary);opacity:0;transition:opacity 0.2s" class="ql-del-btn" aria-label="Remove">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    `;
    div.addEventListener('mouseenter', () => div.querySelector('.ql-del-btn').style.opacity='0.6');
    div.addEventListener('mouseleave', () => div.querySelector('.ql-del-btn').style.opacity='0');
    div.querySelector('.ql-del-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      state.quickLaunch = state.quickLaunch.filter(q=>q.id!==item.id);
      saveState(); renderQuickLaunch();
    });
    // Drag
    div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', item.id); div.style.opacity='0.3'; });
    div.addEventListener('dragend', () => { div.style.opacity='1'; });
    div.addEventListener('dragover', (e) => { e.preventDefault(); div.style.transform='scale(1.08)'; });
    div.addEventListener('dragleave', () => { div.style.transform=''; });
    div.addEventListener('drop', (e) => {
      e.preventDefault(); div.style.transform='';
      const fromId = e.dataTransfer.getData('text/plain');
      const fromIdx = state.quickLaunch.findIndex(q=>q.id===fromId);
      const toIdx = state.quickLaunch.findIndex(q=>q.id===item.id);
      if(fromIdx>=0 && toIdx>=0 && fromIdx!==toIdx) {
        const [moved] = state.quickLaunch.splice(fromIdx,1);
        state.quickLaunch.splice(toIdx,0,moved);
        saveState(); renderQuickLaunch();
      }
    });
    row.appendChild(div);
  });
  // Add button
  const addDiv = document.createElement('div');
  addDiv.className = 'ql-add';
  addDiv.innerHTML = `<div class="ql-add-icon">${ICONS.plus}</div><span>Add</span>`;
  addDiv.addEventListener('click', () => toggleQlForm(true));
  row.appendChild(addDiv);
}

function toggleQlForm(show) {
  const form = document.getElementById('qlForm');
  form.classList.toggle('active', show);
  if(show) document.getElementById('qlTitleInput').focus();
  else { document.getElementById('qlTitleInput').value=''; document.getElementById('qlUrlInput').value=''; }
}

// ========== RENDER CATEGORIES ==========
function renderCategories() {
  const area = document.getElementById('categoriesArea');
  area.innerHTML = '';
  // Calculate canvas height based on card positions
  let maxBottom = 400;
  state.categories.forEach((cat, idx) => {
    const layout = cat.layout || { x: (idx % 3) * 220, y: Math.floor(idx / 3) * 200, w: 240, h: 220 };
    if (layout.y + layout.h > maxBottom) maxBottom = layout.y + layout.h + 40;
  });
  area.style.minHeight = maxBottom + 'px';

  state.categories.forEach(cat => {
    const layout = cat.layout || { x: 0, y: 0, w: 240, h: 220 };
    const card = document.createElement('div');
    card.className = 'card-box';
    card.dataset.catId = cat.id;
    card.style.left = layout.x + 'px';
    card.style.top = layout.y + 'px';
    card.style.width = layout.w + 'px';
    card.style.height = layout.h + 'px';
    card.innerHTML = `
      <div class="card-box-header">
        <span class="cat-name">${cat.name}</span>
        <div class="cat-actions">
          <button class="cat-add-link" title="添加链接">${ICONS.plus}</button>
          <button class="cat-del" title="删除">${ICONS.x}</button>
        </div>
      </div>
      <div class="card-box-body">
        ${cat.links.map(link => `
          <div class="link-row" data-link-id="${link.id}">
            <img src="${favicon(link.url)}" alt="" draggable="false" onerror="this.style.display='none'">
            <a href="${link.url}" target="_blank" rel="noopener" class="link-title" draggable="false">${link.title}</a>
            <div class="link-actions">
              <button class="link-edit" title="编辑">${ICONS.pencil}</button>
              <button class="link-del" title="删除">${ICONS.x}</button>
            </div>
          </div>
        `).join('')}
        <div class="inline-form" data-cat-id="${cat.id}">
          <input type="text" placeholder="Title" class="new-link-title">
          <input type="text" placeholder="URL" class="new-link-url">
          <button class="btn-sm add-link-confirm">Add</button>
          <button class="btn-sm cancel-link-add">${ICONS.x}</button>
        </div>
      </div>
      <div class="card-box-resize"></div>
    `;
    // Drag
    initCardDrag(card, cat);
    // Resize
    initCardResize(card, cat);
    // Events
    card.querySelector('.cat-del').addEventListener('click', () => { state.categories=state.categories.filter(c=>c.id!==cat.id); saveState(); renderCategories(); });
    card.querySelector('.cat-add-link').addEventListener('click', () => {
      const form = card.querySelector('.inline-form');
      form.classList.toggle('active');
      if(form.classList.contains('active')) form.querySelector('.new-link-title').focus();
    });
    card.querySelector('.cancel-link-add').addEventListener('click', (e) => {
      e.currentTarget.closest('.inline-form').classList.remove('active');
    });
    card.querySelector('.add-link-confirm').addEventListener('click', (e) => {
      const form = e.currentTarget.closest('.inline-form');
      const t = form.querySelector('.new-link-title').value.trim();
      const u = form.querySelector('.new-link-url').value.trim();
      if(t&&u) { cat.links.push({id:uid(),title:t,url:u.startsWith('http')?u:'https://'+u}); saveState(); renderCategories(); }
    });
    card.querySelectorAll('.link-row').forEach(row => {
      const linkId = row.dataset.linkId;
      row.querySelector('.link-del').addEventListener('click', (e) => {
        e.stopPropagation(); e.preventDefault();
        cat.links = cat.links.filter(l=>l.id!==linkId); saveState(); renderCategories();
      });
      row.querySelector('.link-edit').addEventListener('click', (e) => {
        e.stopPropagation(); e.preventDefault();
        const link = cat.links.find(l=>l.id===linkId);
        if(!link) return;
        const newTitle = prompt('标题:', link.title);

}

// ========== CARD DRAG ==========
function initCardDrag(card, cat) {
  const header = card.querySelector('.card-box-header');
  let startX, startY, origX, origY;
  header.addEventListener('mousedown', (e) => {
    if(e.target.closest('button')) return;
    e.preventDefault();
    card.classList.add('dragging');
    startX = e.clientX; startY = e.clientY;
    origX = card.offsetLeft; origY = card.offsetTop;
    const onMove = (e2) => {
      const dx = e2.clientX - startX;
      const dy = e2.clientY - startY;
      card.style.left = (origX + dx) + 'px';
      card.style.top = (origY + dy) + 'px';
    };
    const onUp = () => {
      card.classList.remove('dragging');
      if(!cat.layout) cat.layout = {x:0,y:0,w:240,h:220};
      cat.layout.x = card.offsetLeft;
      cat.layout.y = card.offsetTop;
      saveState();
      // Update canvas height
      const area = document.getElementById('categoriesArea');
      let maxB = 400;
      document.querySelectorAll('.card-box').forEach(c => {
        const b = c.offsetTop + c.offsetHeight + 40;
        if(b > maxB) maxB = b;
      });
      area.style.minHeight = maxB + 'px';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ========== CARD RESIZE ==========
function initCardResize(card, cat) {
  const handle = card.querySelector('.card-box-resize');
  let startX, startY, origW, origH;
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    origW = card.offsetWidth; origH = card.offsetHeight;
    const onMove = (e2) => {
      const nw = Math.max(180, origW + (e2.clientX - startX));
      const nh = Math.max(120, origH + (e2.clientY - startY));
      card.style.width = nw + 'px';
      card.style.height = nh + 'px';
    };
    const onUp = () => {
      if(!cat.layout) cat.layout = {x:0,y:0,w:240,h:220};
      cat.layout.w = card.offsetWidth;
      cat.layout.h = card.offsetHeight;
      saveState();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ========== SEARCH ==========
function getAllItems() {
  const items = [];
  state.quickLaunch.forEach(q => items.push({id:q.id,title:q.title,url:q.url,category:'快速启动'}));
  state.categories.forEach(c => c.links.forEach(l => items.push({id:l.id,title:l.title,url:l.url,category:c.name})));
  return items;
}

function fuzzySearch(query) {
  if(!query.trim()) return getAllItems().slice(0,12);
  return getAllItems().filter(i => fuzzy(query, i.title) || fuzzy(query, i.url));
}

// Top bar search
const topSearch = document.getElementById('topSearch');
const topResults = document.getElementById('topSearchResults');
let topSelectedIdx = -1;

topSearch.addEventListener('input', () => {
  const q = topSearch.value;
  const results = fuzzySearch(q);
  topSelectedIdx = -1;
  if(!q.trim() || results.length===0) { topResults.classList.remove('active'); topResults.innerHTML=''; return; }
  const grouped = new Map();
  results.forEach(r => { if(!grouped.has(r.category)) grouped.set(r.category,[]); grouped.get(r.category).push(r); });
  let html = '';
  let gi = 0;
  grouped.forEach((items, cat) => {
    if(gi>0) html += '<div style="border-top:1px solid color-mix(in srgb, var(--border) 40%, transparent)"></div>';
    html += `<div class="search-group-label">${cat}</div>`;
    items.forEach(item => {
      const idx = results.indexOf(item);
      html += `<button class="search-result-item" data-idx="${idx}" onclick="window.open('${item.url}','_blank')"><span class="title">${item.title}</span><span class="url">${item.url}</span></button>`;
    });
    gi++;
  });
  topResults.innerHTML = html;
  topResults.classList.add('active');
  topResults.querySelectorAll('.search-result-item').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      topResults.querySelectorAll('.search-result-item').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      topSelectedIdx = parseInt(btn.dataset.idx);
    });
  });
});

topSearch.addEventListener('keydown', (e) => {
  const items = topResults.querySelectorAll('.search-result-item');
  if(e.key==='ArrowDown') { e.preventDefault(); topSelectedIdx = Math.min(topSelectedIdx+1, items.length-1); items.forEach((b,i)=>b.classList.toggle('selected',i===topSelectedIdx)); }
  else if(e.key==='ArrowUp') { e.preventDefault(); topSelectedIdx = Math.max(topSelectedIdx-1, 0); items.forEach((b,i)=>b.classList.toggle('selected',i===topSelectedIdx)); }
  else if(e.key==='Enter') {
    if(topSelectedIdx>=0 && items[topSelectedIdx]) items[topSelectedIdx].click();
    else if(topSearch.value.trim()) window.open(SEARCH_ENGINES[state.settings.searchEngine].url+encodeURIComponent(topSearch.value),'_blank');
  }
  else if(e.key==='Escape') { topSearch.blur(); topResults.classList.remove('active'); }
});

topSearch.addEventListener('blur', () => { setTimeout(()=>{ topResults.classList.remove('active'); }, 200); });

// ========== SEARCH DIALOG ==========
const searchOverlay = document.getElementById('searchOverlay');
const searchDialog = document.getElementById('searchDialog');
const dialogInput = document.getElementById('dialogSearchInput');
const dialogResults = document.getElementById('dialogResults');
const resultCount = document.getElementById('resultCount');
let dialogSelectedIdx = 0;

function openSearchDialog() {
  searchOverlay.classList.add('active');
  searchDialog.classList.add('active');
  dialogInput.value = '';
  dialogSelectedIdx = 0;
  renderDialogResults();
  setTimeout(() => dialogInput.focus(), 50);
}

function closeSearchDialog() {
  searchOverlay.classList.remove('active');
  searchDialog.classList.remove('active');
}

function renderDialogResults() {
  const results = fuzzySearch(dialogInput.value);
  dialogSelectedIdx = Math.min(dialogSelectedIdx, results.length-1);
  if(dialogSelectedIdx<0 && results.length>0) dialogSelectedIdx=0;
  resultCount.textContent = results.length > 0 ? `${results.length} 个结果` : `${getAllItems().length} 个项目`;
  if(results.length===0 && dialogInput.value.trim()) {
    dialogResults.innerHTML = '<div style="padding:32px 16px;text-align:center"><p style="font-size:13px;color:var(--text-tertiary)">未找到匹配结果</p><p style="font-size:11px;color:color-mix(in srgb, var(--text-tertiary) 40%, transparent);margin-top:4px">按 Enter 使用搜索引擎搜索</p></div>';
    return;
  }
  const grouped = new Map();
  results.forEach(r => { if(!grouped.has(r.category)) grouped.set(r.category,[]); grouped.get(r.category).push(r); });
  let html = '';
  let gi = 0;
  grouped.forEach((items, cat) => {
    if(gi>0) html += '<div style="margin:4px 12px;border-top:1px solid color-mix(in srgb, var(--border) 20%, transparent)"></div>';
    html += `<div class="search-group-label">${cat}</div>`;
    items.forEach(item => {
      const idx = results.indexOf(item);
      html += `<button class="search-result-item ${idx===dialogSelectedIdx?'selected':''}" data-idx="${idx}" onclick="window.open('${item.url}','_blank');closeSearchDialog()"><img src="${favicon(item.url)}" style="width:16px;height:16px;border-radius:3px;opacity:0.7" onerror="this.style.display='none'"><span class="title">${item.title}</span></button>`;
    });
    gi++;
  });
  dialogResults.innerHTML = html;
  dialogResults.querySelectorAll('.search-result-item').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      dialogSelectedIdx = parseInt(btn.dataset.idx);
      dialogResults.querySelectorAll('.search-result-item').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}

dialogInput.addEventListener('input', () => { dialogSelectedIdx=0; renderDialogResults(); });
dialogInput.addEventListener('keydown', (e) => {
  const results = fuzzySearch(dialogInput.value);
  if(e.key==='ArrowDown') { e.preventDefault(); dialogSelectedIdx = (dialogSelectedIdx+1)%Math.max(results.length,1); renderDialogResults(); }
  else if(e.key==='ArrowUp') { e.preventDefault(); dialogSelectedIdx = (dialogSelectedIdx-1+results.length)%Math.max(results.length,1); renderDialogResults(); }
  else if(e.key==='Enter') {
    if(results.length>0 && dialogSelectedIdx>=0) { window.open(results[dialogSelectedIdx].url,'_blank'); closeSearchDialog(); }
    else if(dialogInput.value.trim()) { window.open(SEARCH_ENGINES[state.settings.searchEngine].url+encodeURIComponent(dialogInput.value),'_blank'); closeSearchDialog(); }
  }
  else if(e.key==='Escape') closeSearchDialog();
});

searchOverlay.addEventListener('click', closeSearchDialog);

document.addEventListener('keydown', (e) => {
  if((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openSearchDialog(); }

});

    bgArea.querySelectorAll('[data-uid]').forEach(btn => btn.addEventListener('click', () => { state.settings.background.value=btn.dataset.uid; applyBackground(); saveState(); renderSettings(); }));
    bgArea.querySelector('#bgUnsplash').addEventListener('input', (e) => { state.settings.background.value=e.target.value; applyBackground(); saveState(); });
  }
  // Switches
  document.getElementById('switchTime').className = 'switch' + (state.settings.showTime?' on':'');
  document.getElementById('switchGreeting').className = 'switch' + (state.settings.showGreeting?' on':'');

  // Static contrast slider (in appearance section body)
  const csRange = document.getElementById('contrastRangeStatic');
  const csVal = document.getElementById('contrastValStatic');
  if(csRange) {
    csRange.value = state.settings.contrast || 50;
    if(csVal) csVal.textContent = (state.settings.contrast||50) + '%';
    csRange.oninput = (e) => {
      const val = parseInt(e.target.value);
      if(csVal) csVal.textContent = val + '%';
      state.settings.contrast = val;
      applyBackground(); saveState();
    };
  }
}

// Switch events
document.getElementById('switchTime').addEventListener('click', function() { state.settings.showTime=!state.settings.showTime; this.classList.toggle('on'); saveState(); updateTime(); });
document.getElementById('switchGreeting').addEventListener('click', function() { state.settings.showGreeting=!state.settings.showGreeting; this.classList.toggle('on'); saveState(); updateTime(); });

// Spacing slider
const spRange = document.getElementById('spacingRange');
const spVal = document.getElementById('spacingVal');
if(spRange) {
  spRange.value = state.settings.spacing || 50;
  if(spVal) spVal.textContent = (state.settings.spacing||50) + '%';
  spRange.oninput = (e) => {
    const val = parseInt(e.target.value);
    if(spVal) spVal.textContent = val + '%';
    state.settings.spacing = val;
    applySpacing(val);
    saveState();
  };
}

// Contrast/brightness quick panel toggle
const contrastBtn = document.getElementById('contrastBtn');
const contrastPanel = document.getElementById('contrastPanel');
if(contrastBtn) {
  contrastBtn.addEventListener('click', () => {
    const isOpen = contrastPanel.style.maxHeight !== '0px' && contrastPanel.style.maxHeight !== '';
    if(isOpen) {
      contrastPanel.style.maxHeight = '0px';
      contrastPanel.style.opacity = '0';
      contrastPanel.style.marginBottom = '0';
    } else {
      contrastPanel.style.maxHeight = '200px';
      contrastPanel.style.opacity = '1';
      contrastPanel.style.marginBottom = '16px';
      // Sync brightness slider with current bg
      if(state.settings.background.type === 'solid') {
        const [, , l] = hexToHsl(state.settings.background.value);
        const brRange = document.getElementById('brightnessRangeQuick');
        const brVal = document.getElementById('brightnessValQuick');
        if(brRange) brRange.value = l;
        if(brVal) brVal.textContent = l + '%';
      }
    }
  });
}

// Quick brightness slider
const brRangeQ = document.getElementById('brightnessRangeQuick');
const brValQ = document.getElementById('brightnessValQuick');
if(brRangeQ) {
  brRangeQ.oninput = (e) => {
    const nl = parseInt(e.target.value);
    if(brValQ) brValQ.textContent = nl + '%';
    if(state.settings.background.type === 'solid') {
      const [h, s] = hexToHsl(state.settings.background.value);
      const newColor = hslToHex(h, s, nl);
      state.settings.background.value = newColor;
      applyBackground(); saveState();
    }
  };
}

// Quick contrast slider — controls SIDEBAR background vs text contrast only
const ctRangeQ = document.getElementById('contrastRangeQuick');
const ctValQ = document.getElementById('contrastValQuick');
if(ctRangeQ) {
  ctRangeQ.value = state.settings.sidebarContrast || 50;
  if(ctValQ) ctValQ.textContent = (state.settings.sidebarContrast||50) + '%';
  ctRangeQ.oninput = (e) => {
    const val = parseInt(e.target.value);
    if(ctValQ) ctValQ.textContent = val + '%';
    state.settings.sidebarContrast = val;
    applySidebarContrast(val);
    saveState();
  };
}

// Apply sidebar-only contrast: controls sidebar bg darkness vs text brightness
function applySidebarContrast(val) {
  // val 10-100: 10=very low contrast (bg and text similar), 100=very high contrast
  // Based on warm white #f5f2ed (hsl ~30, 25%, 95%)
  const root = document.documentElement;
  // Sidebar background: warm white base, slightly darker at low contrast
  const bgL = Math.round(80 + (val/100) * 15); // 80-95 lightness
  const bgS = 25;
  const bgH = 30;
  root.style.setProperty('--sidebar-surface', hslToHex(bgH, bgS, bgL));
  root.style.setProperty('--sidebar-surface-secondary', hslToHex(bgH, bgS, Math.max(bgL - 4, 70)));
  root.style.setProperty('--sidebar-border', hslToHex(bgH, bgS, Math.max(bgL - 10, 60)));
  // Text colors: darker at high contrast, closer to bg at low contrast
  const textPrimaryL = Math.round(45 - (val/100) * 25); // 45-20 (darker = more contrast)
  const textSecondaryL = Math.round(55 - (val/100) * 20); // 55-35
  const textTertiaryL = Math.round(65 - (val/100) * 15); // 65-50
  root.style.setProperty('--sidebar-text', hslToHex(bgH, 10, textPrimaryL));
  root.style.setProperty('--sidebar-text-secondary', hslToHex(bgH, 10, textSecondaryL));
  root.style.setProperty('--sidebar-text-tertiary', hslToHex(bgH, 10, textTertiaryL));
}

// Site name
document.getElementById('settingSiteName').addEventListener('input', (e) => {
  state.settings.siteName = e.target.value;
  document.getElementById('siteName').textContent = e.target.value || 'Zenith';
  saveState();
});

// Theme toggle button
document.getElementById('themeToggle').addEventListener('click', () => {
  const isDark = document.body.classList.contains('dark');
  const newTheme = isDark ? 'light' : 'dark';
  state.settings.theme = newTheme;
  applyTheme(newTheme);
  saveState();
  if(settingsDrawer.classList.contains('active')) renderSettings();
});

// Data buttons
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`zenith-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click(); URL.revokeObjectURL(a.href);
});

document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { try { state=JSON.parse(ev.target.result); saveState(); init(); } catch(err){ alert('无效的 JSON 文件'); } };
  reader.readAsText(file);
  e.target.value='';
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('确定要重置所有设置和数据吗？')) {
    state = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveState(); init();
  }
});

// ========== QUICK LAUNCH FORM ==========
document.getElementById('qlAddBtn').addEventListener('click', addQlItem);
document.getElementById('qlCancelBtn').addEventListener('click', () => toggleQlForm(false));
document.getElementById('qlTitleInput').addEventListener('keydown', (e) => { if(e.key==='Enter') addQlItem(); if(e.key==='Escape') toggleQlForm(false); });
document.getElementById('qlUrlInput').addEventListener('keydown', (e) => { if(e.key==='Enter') addQlItem(); if(e.key==='Escape') toggleQlForm(false); });
document.getElementById('qlTitleInput').addEventListener('input', checkQlForm);
document.getElementById('qlUrlInput').addEventListener('input', checkQlForm);

function checkQlForm() {
  document.getElementById('qlAddBtn').disabled = !(document.getElementById('qlTitleInput').value.trim() && document.getElementById('qlUrlInput').value.trim());
}

function addQlItem() {
  const t = document.getElementById('qlTitleInput').value.trim();
  const u = document.getElementById('qlUrlInput').value.trim();
  if(t&&u) { state.quickLaunch.push({id:uid(),title:t,url:u.startsWith('http')?u:'https://'+u}); saveState(); renderQuickLaunch(); toggleQlForm(false); }
}

// ========== INIT ==========
let _timeInterval = null;
function applySpacing(val) {
  // Map 10-100 to scale factor 0.5-1.5
  const scale = 0.5 + (val / 100);
  // Apply to all spacing-related elements
  const root = document.documentElement;
  root.style.setProperty('--spacing-scale', scale);
  // Divider margins: base 24px * scale
  const divMargin = Math.round(24 * scale);
  document.querySelectorAll('.settings-drawer .divider').forEach(el => {
    el.style.marginTop = divMargin + 'px';
    el.style.marginBottom = divMargin + 'px';
  });
  // Section header padding
  document.querySelectorAll('.settings-section-header').forEach(el => {
    el.style.paddingTop = Math.round(10 * scale) + 'px';
    el.style.paddingBottom = Math.round(10 * scale) + 'px';
  });
  // Setting rows
  document.querySelectorAll('.setting-row').forEach(el => {
    el.style.paddingTop = Math.round(10 * scale) + 'px';
    el.style.paddingBottom = Math.round(10 * scale) + 'px';
  });
  // Setting row inline margins
  document.querySelectorAll('.setting-row-inline').forEach(el => {
    el.style.marginBottom = Math.round(14 * scale) + 'px';
  });
  // Card box headers
  document.querySelectorAll('.card-box-header').forEach(el => {
    el.style.paddingTop = Math.round(10 * scale) + 'px';
    el.style.paddingBottom = Math.round(10 * scale) + 'px';
  });
  // Link rows
  document.querySelectorAll('.link-row').forEach(el => {
    el.style.paddingTop = Math.round(6 * scale) + 'px';
    el.style.paddingBottom = Math.round(6 * scale) + 'px';
  });
  // Quick launch gap
  const qlRow = document.getElementById('quickLaunchRow');
  if(qlRow) qlRow.style.gap = Math.round(28 * scale) + 'px';
  // Content wrapper gap
  const cw = document.querySelector('.content-wrapper');
  if(cw) {
    cw.style.gap = Math.round(48 * scale) + 'px';
    cw.style.marginTop = Math.round(64 * scale) + 'px';
  }
}

function init() {
  applyTheme(state.settings.theme);
  applyAccent(state.settings.accentColor);
  document.getElementById('siteName').textContent = state.settings.siteName;
  document.getElementById('modKey').textContent = isMac()?'⌘':'Ctrl';
  document.getElementById('modKey2').textContent = isMac()?'⌘':'Ctrl';
  if(_timeInterval) clearInterval(_timeInterval);
  updateTime();
  _timeInterval = setInterval(updateTime, 1000);
  applySpacing(state.settings.spacing || 50);
  applySidebarContrast(state.settings.sidebarContrast || 50);
  if(state.settings.cardBgColor) document.documentElement.style.setProperty('--card-bg', state.settings.cardBgColor);
  if(state.settings.cardRowHoverColor) document.documentElement.style.setProperty('--card-row-hover', state.settings.cardRowHoverColor);
  renderQuickLaunch();
  renderCategories();
}

loadState();
init();
</script>
