<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith — Minimal Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --surface:#fafafa;--surface-secondary:#f5f5f5;--surface-hover:#eee;--text-primary:#111;--text-secondary:#666;--text-tertiary:#999;--accent:#888;--accent-hover:#aaa;--border:#e8e8e8; }
.dark { --surface:#1a1a1a;--surface-secondary:#222;--surface-hover:#2a2a2a;--text-primary:#e8e8e8;--text-secondary:#999;--text-tertiary:#666;--accent:#888;--accent-hover:#aaa;--border:#2a2a2a; }
html { -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility; }
body { font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--surface);color:var(--text-primary);transition:background .5s,color .5s;min-height:100vh;overflow-x:hidden; }
::selection { background:var(--accent);color:var(--surface); }
::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:color-mix(in srgb,var(--text-tertiary) 40%,transparent);border-radius:3px; }
*:focus-visible { outline:1px solid var(--accent);outline-offset:2px;border-radius:2px; }
input::placeholder { color:var(--text-tertiary); }
a { color:inherit;text-decoration:none; } button { font-family:inherit;cursor:pointer;border:none;background:none;color:inherit; }
</style>
</head>
<body class="dark">

</body>
</html>
